# .ota/config.yml
#
# OTA (Over-The-Air) update configuration for this repo.
# Managed by ota-self-update.yml — do not edit pinned_sha/pinned_at/ota_version
# manually; they are updated automatically after each successful OTA sync.
#
# Fields:
#   enabled          Set to false to opt out of all OTA updates.
#   upstream_override  Full repo path (owner/name) to pull updates from.
#                    Leave empty to use the fork parent (detected automatically).
#   pinned_sha       Last SHA successfully delivered. Updated by ota-self-update.
#   pinned_at        ISO-8601 timestamp of last successful sync.
#   ota_version      Release tag of last successful sync.
#   mirror_chain_opt_in  Set to true if this repo is in the mirror chain and
#                    should receive mirror-chain workflow updates.

enabled: true
upstream_override: ""
pinned_sha: ""
pinned_at: ""
ota_version: ""
mirror_chain_opt_in: false
