# blincus cloud-init template — Go service
# Install: cp blincus-{{@@ component @@}}.yaml ~/.config/blincus/cloud-init/
# Launch:  blincus launch -t {{@@ component @@}} my-{{@@ component @@}}

architecture: x86_64
config:
  user.user-data: |-
    #cloud-config
    packages:
      - curl
      - wget
      - openssh-server
      - git
      - ca-certificates
    users:
      - name: BLINCUSUSER
        plain_text_passwd: 'BLINCUSPASSWORD'
        home: /home/BLINCUSUSER
        shell: /bin/bash
        lock_passwd: True
        gecos: BLINCUSFULLNAME
        groups: [adm, cdrom, dip, sudo]
        sudo: ALL=(ALL) NOPASSWD:ALL
        ssh_authorized_keys:
          - SSHKEY
    runcmd:
      - [ sh, -c, "curl -fsSL https://go.dev/dl/go1.23.linux-amd64.tar.gz | tar -C /usr/local -xz" ]
      - [ sh, -c, "echo 'export PATH=$PATH:/usr/local/go/bin' >> /root/.bashrc" ]
      - [ sh, -c, "git clone https://github.com/Interested-Deving-1896/{{@@ component @@}} /opt/src" ]
      - [ sh, -c, "cd /opt/src && /usr/local/go/bin/go mod download && /usr/local/go/bin/go build -o /opt/{{@@ component @@}}/{{@@ component @@}}" ]
      - [ sh, -c, "[ -x /opt/scripts/init.sh ] && /opt/scripts/init.sh" ]
      - [ sh, -c, "systemctl enable --now {{@@ component @@}} 2>/dev/null || true" ]
    write_files:
      - path: /etc/systemd/system/{{@@ component @@}}.service
        content: |
          [Unit]
          Description={{@@ component @@}}
          After=network.target
          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/{{@@ component @@}}
          EnvironmentFile=-/etc/{{@@ component @@}}.env
          ExecStart=/opt/{{@@ component @@}}/{{@@ component @@}}
          Restart=on-failure
          [Install]
          WantedBy=multi-user.target
      - path: /etc/{{@@ component @@}}.env
        content: |
          # Configure {{@@ component @@}} here
description: "{{@@ component @@}} — Go service blincus template"
