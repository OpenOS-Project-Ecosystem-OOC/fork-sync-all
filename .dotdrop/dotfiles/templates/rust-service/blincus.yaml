# blincus cloud-init template — Rust service
# Install: cp blincus-{{@@ component @@}}.yaml ~/.config/blincus/cloud-init/
# Launch:  blincus launch -t {{@@ component @@}} my-{{@@ component @@}}

architecture: x86_64
config:
  user.user-data: |-
    #cloud-config
    packages:
      - curl
      - wget
      - openssh-server
      - git
      - ca-certificates
      - build-essential
      - pkg-config
      - libssl-dev
      - musl-tools
    users:
      - name: BLINCUSUSER
        plain_text_passwd: 'BLINCUSPASSWORD'
        home: /home/BLINCUSUSER
        shell: /bin/bash
        lock_passwd: True
        gecos: BLINCUSFULLNAME
        groups: [adm, cdrom, dip, sudo]
        sudo: ALL=(ALL) NOPASSWD:ALL
        ssh_authorized_keys:
          - SSHKEY
    runcmd:
      - [ sh, -c, "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable" ]
      - [ sh, -c, "source /root/.cargo/env && rustup target add x86_64-unknown-linux-musl" ]
      - [ sh, -c, "git clone https://github.com/Interested-Deving-1896/{{@@ component @@}} /opt/src" ]
      - [ sh, -c, "source /root/.cargo/env && cd /opt/src && cargo build --release --target x86_64-unknown-linux-musl" ]
      - [ sh, -c, "mkdir -p /opt/{{@@ component @@}} && cp target/x86_64-unknown-linux-musl/release/{{@@ component @@}} /opt/{{@@ component @@}}/" ]
      - [ sh, -c, "[ -x /opt/scripts/init.sh ] && /opt/scripts/init.sh" ]
      - [ sh, -c, "systemctl enable --now {{@@ component @@}} 2>/dev/null || true" ]
    write_files:
      - path: /etc/systemd/system/{{@@ component @@}}.service
        content: |
          [Unit]
          Description={{@@ component @@}}
          After=network.target
          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/{{@@ component @@}}
          EnvironmentFile=-/etc/{{@@ component @@}}.env
          ExecStart=/opt/{{@@ component @@}}/{{@@ component @@}}
          Restart=on-failure
          [Install]
          WantedBy=multi-user.target
      - path: /etc/{{@@ component @@}}.env
        content: |
          # Configure {{@@ component @@}} here
description: "{{@@ component @@}} — Rust service blincus template"
