# distrobuilder image definition — Vite app (Bun runtime)
# dotdrop template: deploy with:
#   dotdrop install -c .dotdrop/config.yaml -p vite-app \
#     -V component=myapp -V dst_dir=path/to/repo

image:
  name: "{{@@ component @@}}"
  distribution: ubuntu
  release: noble
  description: "{{@@ component @@}} — Vite app (Bun)"
  architecture: x86_64

source:
  downloader: debootstrap
  url: http://archive.ubuntu.com/ubuntu
  suite: noble
  same_as: noble
  keyserver: keyserver.ubuntu.com
  keys:
    - 0x871920D1991BC93C

targets:
  incus:
    vm: false

packages:
  manager: apt
  update: true
  cleanup: true
  sets:
    - packages:
        - curl
        - ca-certificates
        - unzip
      action: install

actions:
  - trigger: post-packages
    action: |-
      #!/bin/sh
      set -eux
      curl -fsSL https://bun.sh/install | bash
      mkdir -p /opt/{{@@ component @@}}

  - trigger: post-files
    action: |-
      #!/bin/sh
      set -eux
      cat > /etc/systemd/system/{{@@ component @@}}.service << 'EOF'
      [Unit]
      Description={{@@ component @@}}
      After=network.target
      [Service]
      Type=simple
      User=root
      WorkingDirectory=/opt/{{@@ component @@}}
      EnvironmentFile=-/etc/{{@@ component @@}}.env
      ExecStart=/root/.bun/bin/bun server.mjs
      Restart=on-failure
      RestartSec=5
      [Install]
      WantedBy=multi-user.target
      EOF
      systemctl enable {{@@ component @@}}

files:
  - path: /etc/hostname
    generator: hostname
  - path: /etc/hosts
    generator: hosts
  - path: /etc/machine-id
    generator: dump
