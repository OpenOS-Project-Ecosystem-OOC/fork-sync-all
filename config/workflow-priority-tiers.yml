# config/workflow-priority-tiers.yml
#
# Single source of truth for workflow priority tiers used by:
#   - scripts/queue-manager.sh   (dedup + evict)
#   - scripts/quota-reserve.sh   (reserve enforcement)
#
# Tiers:
#   1  CRITICAL — never cancelled by queue-manager or quota-reserve
#   2  HIGH     — cancelled only as last resort
#   3  MEDIUM   — cancelled when quota is low (default for unknown workflows)
#   4  LOW      — cancelled first
#
# When adding a new workflow, add it here. Both scripts read this file
# at runtime via the load_tiers() helper — no script edits needed.

tiers:
  # ── Tier 1: CRITICAL ────────────────────────────────────────────────────────
  # Security, quota management, and config validation.
  # These must always be able to run regardless of queue or quota state.
  - name: "Rotate Secret Token"
    tier: 1
  - name: "Queue Manager"
    tier: 1
  - name: "Quota Reserve"
    tier: 1
  - name: "Critical Deploy"
    tier: 1
  - name: "Critical Deploy — OSP"
    tier: 1
  - name: "Critical Deploy — OOC"
    tier: 1
  - name: "Critical Deploy — All"
    tier: 1
  - name: "Critical Deploy — Stub (TODO)"
    tier: 1
  - name: "GitLab Critical Deploy"
    tier: 1
  - name: "Cancel Stale Runs"
    tier: 1
  - name: "Cancel Runs After Token Rotation"
    tier: 1
  - name: "Validate Config"
    tier: 1
  - name: "Full Audit"
    tier: 3
  - name: "Onboard Repository"
    tier: 3
  - name: "Devcontainer SDK"
    tier: 3
  - name: "Manage Subtrees"
    tier: 4
  - name: "Token Health Monitor"
    tier: 1
  - name: "Mirror Watchdog"
    tier: 1
  - name: "Rate-Limit Re-trigger"
    tier: 1
  - name: "Quota Monitor"
    tier: 1
  - name: "Pre-Flush Prep"
    tier: 1

  # ── Tier 2: HIGH ────────────────────────────────────────────────────────────
  # Core mirror chain and sync operations.
  # Cancelled only when quota is critically low and no tier-4 runs remain.
