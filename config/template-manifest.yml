# config/template-manifest.yml
#
# Defines named profiles that control which files are propagated from
# fork-sync-all to consumer repos.
#
# Used by:
#   scripts/sync-template.sh  — loaded when MANIFEST_FILE is set
#
# A profile is a named set of include/exclude glob patterns applied to the
# fork-sync-all file tree before syncing. Patterns are matched against paths
# relative to the repo root (e.g. ".github/workflows/pr-automation.yml").
#
# Pattern rules:
#   - Patterns are evaluated in order: includes first, then excludes.
#   - A path is included if it matches at least one include pattern (or if
#     no include patterns are defined, all paths are included by default).
#   - A path is excluded if it matches any exclude pattern, regardless of
#     whether it matched an include pattern.
#   - Glob syntax: * matches within a path segment, ** matches across segments.
#   - Patterns without a leading / are matched against the full relative path.
#
# The following paths are ALWAYS excluded regardless of profile or per-consumer
# overrides (enforced in sync-template.sh EXCLUDED_PATHS):
#
#   Repo-specific content (never overwrite in targets):
#     README.md, registered-imports.json, dep-graph/, .git/, .ona/
#
#   Generated/compiled artifacts:
#     __pycache__/, *.pyc, *.pyo, node_modules/, .pytest_cache/
#
#   fork-sync-all operational files (no meaning in consumer repos):
#     DOCS/                         operational reference docs
#     AGENTS.md                     fork-sync-all agent conventions (repo-specific)
#     .gitlab-ci.yml                org-wide sync pipeline (sync-forks, mirror-to-osp, etc.)
#     .gitlab/                      GitLab MR templates and scheduled maintenance
#     .devcontainer/devcontainer.json   fork-sync-all dev environment (repo-specific)
#     .devcontainer/features/           fork-sync-all custom devcontainer features
#     .devcontainer/devcontainer.template.json  ← propagated to consumers (Ona + headroom)
#     .devcontainer/automations.template.yaml   ← propagated to consumers (headroom proxy)
#     config/workflow-cost-profiles.yml
#     config/workflow-sync.yml
#     tests/                        pytest suite for fork-sync-all validators
#     scripts/validate-*.py         config/script validators
#     scripts/validate-workflows.sh workflow allowlist checker
#     scripts/generate-dep-graph.sh dependency graph generator
#     scripts/generate-gitlab-stubs.py
#     scripts/init-kde-groups-mirror.py
#     scripts/kde-path-to-gl-id.json
#     scripts/rl-manifest-to-md.py
#
#   Project-specific source trees:
#     lkm/                          lkm Python package — belongs in its own repo
#
#   Project-specific build/packaging workflows:
#     .github/workflows/appimage.yml
#     .github/workflows/flatpak.yml
#     .github/workflows/publish.yml        lkm PyPI publish
#     .github/workflows/build-arm64.yml    xanmod-unified-kernel-specific
#     .github/workflows/bootstrap-triggers.yml  one-shot self-destruct
#     .github/workflows/ci.yml             project-specific C/cmake/kernel CI
#
#   Project-specific style configs:
#     .clang-format                 C/kernel style — wrong for shell/Python/YAML repos
#     .devcontainer/Dockerfile      btrfs-dwarfs-framework-specific build environment
#
# Note: .ona/ contains workspace-specific Ona agent data (review comments,
# skills). Skills in .ona/skills/ are intentionally not propagated — each
# repo's skills should reflect that repo's own workflows, not fork-sync-all's.
#
# Per-consumer overrides in template-consumers.yml:
#   exclude_paths: [...]  — additional paths to exclude on top of the profile
#   include_paths: [...]  — re-include paths that the profile excluded
#   (include_paths are applied after profile excludes, so they can restore
#    specific files from an otherwise-excluded directory)
#
# To add a new profile: append an entry under `profiles:` below.
# Profile names are arbitrary strings; `full` is the implicit default when
# no profile is specified for a consumer.

profiles:

  # ── full ────────────────────────────────────────────────────────────────────
  # Everything in the template tree. Used for standard fork-sync-all consumers
  # that participate in the full mirror/sync/readme infrastructure.
  full:
    description: >
      All template files. For repos that are full participants in the
      fork-sync-all mirror and sync infrastructure.
    # No include/exclude — all files pass through (minus the global exclusions).

  # ── mirror ──────────────────────────────────────────────────────────────────
  # Full mirror/sync suite plus shared infra tooling. Excludes workflows and
  # config that only make sense on the fork-sync-all repo itself.
  # Note: tests/, .gitlab-ci.yml, .devcontainer/, config/workflow-*.yml,
  # scripts/validate-*.py, and other fork-sync-all-only files are excluded
  # globally in sync-template.sh EXCLUDED_PATHS and need not be listed here.
  mirror:
    description: >
      Mirror and sync workflows plus shared infra tooling including README
      translation. For repos that participate in the OSP/OOC mirror chain
      but are not fork-sync-all itself.
    exclude:
      - .github/workflows/sync-template.yml
      - .github/workflows/validate-config.yml
      - .github/workflows/generate-dep-graph.yml
      - config/gitlab-subgroups.yml
      - config/template-consumers.yml
      - config/template-manifest.yml
      - scripts/validate-gitlab-subgroups.py
      - scripts/sync-template.sh
      # Operational docs are fork-sync-all-specific — not relevant to consumers
      - DOCS/**

  # ── infra-core ──────────────────────────────────────────────────────────────
  # Shared CI hygiene tooling with autonomous-fallback operational workflows.
  #
  # Managed mode (default): fork-sync-all is present and handles rate-limit
  # reruns, CI resolution, queue management, quota reserve, and branch cleanup
  # centrally across all orgs. The bundled workflows detect this via the
  # FSA_MANAGED repo variable (set by sync-template.sh) and skip themselves.
  #
  # Autonomous mode: if a consumer repo is forked independently without
  # fork-sync-all alongside it, the bundled workflows activate and handle
  # everything locally, scoped to the repo's own owner.
  #
  # Mode detection uses a hybrid A+B+C approach (see scripts/includes/fsa-mode.sh):
  #   B — FSA_MANAGED repo variable (cheapest, set by sync-template.sh)
  #   A — GET /repos/{owner}/fork-sync-all existence check
  #   C — token owner's fork-sync-all existence (tiebreaker)
  infra-core:
    description: >
      Per-repo CI hygiene plus autonomous-fallback operational workflows.
      In managed mode (fork-sync-all present) the bundled workflows are no-ops.
      In autonomous mode (independent fork) they activate and self-manage.
    include:
      # ── Per-repo CI hygiene (always active) ──────────────────────────────
      - .github/workflows/pr-automation.yml
      - .github/workflows/rotate-token.yml
      - .github/workflows/token-health.yml
      - .github/workflows/validate-readme-render.yml
      - .github/dependabot.yml
      - scripts/pr-automation.sh
      - scripts/rotate-token.sh
      - scripts/token-monitor.sh
      - scripts/check-readme-render.sh
      - scripts/write-summary.sh
      # ── Autonomous-fallback operational workflows ─────────────────────────
      # These are no-ops when FSA_MANAGED=true (fork-sync-all is present).
      # They activate when the repo is forked independently.
      - .github/workflows/rate-limit-rerun.yml
      - .github/workflows/resolve-failures.yml
      - .github/workflows/queue-manager.yml
      - .github/workflows/quota-reserve.yml
      - .github/workflows/notify-poller.yml
      - .github/workflows/cleanup-branches.yml
      - .github/workflows/rebase-prs.yml
      - .github/workflows/update-infra-deps.yml
      - .github/workflows/enforce-agnostic-vendor.yml
      - .github/workflows/cancel-stale-runs.yml
      - .github/workflows/cancel-post-rotation.yml
      - .github/workflows/rate-limit-status.yml
      - .github/workflows/validate-config.yml
      # ── OTA self-management (autonomous by design) ────────────────────────
      - .github/workflows/ota-opt-in.yml
      - .github/workflows/ota-self-update.yml
      - .github/workflows/verify-fork-integrity.yml
      # ── README management (scoped to this repo in autonomous mode) ────────
      - .github/workflows/create-readmes.yml
      - .github/workflows/readme-wizard.yml
      - .github/workflows/update-readmes.yml
      - .github/workflows/translate-readmes.yml
      # ── mdBook documentation ──────────────────────────────────────────────
      - .github/workflows/deploy-book.yml
      - .github/workflows/generate-book-pages.yml
      - .github/workflows/translate-docs.yml
      # ── Scripts required by autonomous-fallback workflows ─────────────────
      - scripts/scan-rate-limit-failures.sh
      - scripts/rerun-after-rate-limit.sh
      - scripts/rl-manifest-to-md.py
      - scripts/resolve-failures.sh
      - scripts/queue-manager.sh
      - scripts/quota-reserve.sh
      - scripts/cleanup-branches.sh
      - scripts/rebase-prs.sh
      - scripts/update-infra-deps.sh
      - scripts/create-readmes.sh
      - scripts/update-readmes.sh
      - scripts/translate-readmes.sh
      - scripts/verify-fork-integrity.sh
      - scripts/readme-wizard.sh
      - scripts/check-rate-limits.sh
      - scripts/generate-book-pages.py
      - scripts/includes/fsa-mode.sh
      - scripts/includes/budget.sh
      - scripts/includes/gh-api.sh
      - scripts/includes/quota-instrument.sh
      - scripts/includes/llm.sh
      - config/workflow-priority-tiers.yml
      - config/workflow-quota-costs.yml
      # ── DOCS scaffold (only injected if DOCS/ does not already exist) ─────
      - assets/docs-scaffold/SUMMARY.md:DOCS/SUMMARY.md
      - assets/docs-scaffold/README.md:DOCS/README.md
      - assets/docs-scaffold/getting-started.md:DOCS/getting-started.md
      - assets/docs-scaffold/contributing.md:DOCS/contributing.md
      # ── OTA stub (only injected if .ota/config.yml does not already exist) ─
      - assets/ota-stub/config.yml:.ota/config.yml
      - .gitignore
      - LICENSE

  # ── upstream-sync ────────────────────────────────────────────────────────────
  # For repos that declare their upstream dependencies in a registry file and
  # want the sync-registry-sources workflow to keep them current automatically.
  # Extends infra-core with the two upstream-sync files.
  #
  # The workflow reads its registry source from repository variables
  # (vars.AF_REGISTRY_REPO / AF_REGISTRY_BRANCH / AF_REGISTRY_PATH) so the
  # same workflow file works for any project without modification.
  upstream-sync:
    description: >
      Per-repo CI hygiene plus sync-registry-sources workflow and script.
      For repos that track upstream dependencies via a registry file.
      Org-wide workflows (branch cleanup, failure resolution, dep updates,
      README translation, notify-poller) are NOT propagated — they run
      centrally from fork-sync-all against all repos.
    include:
      # ── Per-repo CI hygiene (always active) ──────────────────────────────
      - .github/workflows/pr-automation.yml
      - .github/workflows/rotate-token.yml
      - .github/workflows/token-health.yml
      - .github/workflows/sync-registry-sources.yml
      - .github/workflows/validate-readme-render.yml
      - .github/dependabot.yml
      - scripts/pr-automation.sh
      - scripts/rotate-token.sh
      - scripts/token-monitor.sh
      - scripts/check-readme-render.sh
      - scripts/write-summary.sh
      - scripts/sync-registry-sources.sh
      # ── Autonomous-fallback operational workflows ─────────────────────────
      - .github/workflows/rate-limit-rerun.yml
      - .github/workflows/resolve-failures.yml
      - .github/workflows/queue-manager.yml
      - .github/workflows/quota-reserve.yml
      - .github/workflows/notify-poller.yml
      - .github/workflows/cleanup-branches.yml
      - .github/workflows/rebase-prs.yml
      - .github/workflows/update-infra-deps.yml
      - .github/workflows/enforce-agnostic-vendor.yml
      - .github/workflows/cancel-stale-runs.yml
      - .github/workflows/cancel-post-rotation.yml
      - .github/workflows/rate-limit-status.yml
      - .github/workflows/validate-config.yml
      - .github/workflows/ota-opt-in.yml
      - .github/workflows/ota-self-update.yml
      - .github/workflows/verify-fork-integrity.yml
      - .github/workflows/create-readmes.yml
      - .github/workflows/readme-wizard.yml
      - .github/workflows/update-readmes.yml
      - .github/workflows/translate-readmes.yml
      - .github/workflows/deploy-book.yml
      - .github/workflows/generate-book-pages.yml
      - .github/workflows/translate-docs.yml
      - scripts/scan-rate-limit-failures.sh
      - scripts/rerun-after-rate-limit.sh
      - scripts/rl-manifest-to-md.py
      - scripts/resolve-failures.sh
      - scripts/queue-manager.sh
      - scripts/quota-reserve.sh
      - scripts/cleanup-branches.sh
      - scripts/rebase-prs.sh
      - scripts/update-infra-deps.sh
      - scripts/create-readmes.sh
      - scripts/update-readmes.sh
      - scripts/translate-readmes.sh
      - scripts/verify-fork-integrity.sh
      - scripts/readme-wizard.sh
      - scripts/check-rate-limits.sh
      - scripts/generate-book-pages.py
      - scripts/includes/fsa-mode.sh
      - scripts/includes/budget.sh
      - scripts/includes/gh-api.sh
      - scripts/includes/quota-instrument.sh
      - scripts/includes/llm.sh
      - config/workflow-priority-tiers.yml
      - config/workflow-quota-costs.yml
      - assets/docs-scaffold/SUMMARY.md:DOCS/SUMMARY.md
      - assets/docs-scaffold/README.md:DOCS/README.md
      - assets/docs-scaffold/getting-started.md:DOCS/getting-started.md
      - assets/docs-scaffold/contributing.md:DOCS/contributing.md
      - assets/ota-stub/config.yml:.ota/config.yml
      - .gitignore
      - LICENSE

  # ── standalone ──────────────────────────────────────────────────────────────
  # Minimal footprint: only PR automation and token rotation. For repos that
  # are self-contained and only need basic CI hygiene without the full infra
  # tooling suite. README translation is intentionally excluded — it requires
  # GitHub Models quota and is heavyweight for minimal repos.
  standalone:
    description: >
      Minimal CI hygiene: PR automation and token rotation only.
      For self-contained repos that don't need the broader infra suite.
      README translation excluded (use infra-core or mirror if needed).
    include:
      - .github/workflows/pr-automation.yml
      - .github/workflows/rotate-token.yml
      - .github/dependabot.yml
      - scripts/pr-automation.sh
      - scripts/rotate-token.sh
      - scripts/write-summary.sh
      - .gitignore
      - LICENSE
