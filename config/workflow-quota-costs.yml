  min_quota: 50
  cost_low: 5
  cost_mid: 15
  cost_high: 30
  basis: code-audit
  synopsis: Triggered by repository_dispatch from penguins-eggs when docs/chromiumos/ changes on all-features. Syncs the updated
    docs into the penguins-eggs-book repo.
- name: Trigger Artifact Mirror
  min_quota: 50
  cost_low: 2
  cost_mid: 5
  cost_high: 10
  basis: code-audit
  synopsis: Dispatches mirror-artifacts immediately when a release is published in this repo, so OSP and OOC receive the release
    without waiting for the next scheduled run.
- name: Update Workflow Triggers Doc
  min_quota: 50
  cost_low: 5
  cost_mid: 10
  cost_high: 20
  basis: code-audit
  synopsis: Regenerates docs/workflow-triggers.md and docs/workflow-triggers.txt whenever a workflow file changes on main.
    Commits the result directly to main.
