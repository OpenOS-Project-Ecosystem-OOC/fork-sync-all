- name: OTA Release
  min_quota: 100
  cost_low: 10
  cost_mid: 40
  cost_high: 100
  basis: code-audit
  synopsis: Triggered on semver tag push. Assembles and delivers OTA updates to all opted-in repos in config/ota-registry.yml,
