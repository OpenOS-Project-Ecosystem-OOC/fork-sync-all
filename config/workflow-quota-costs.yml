  min_quota: 50
  cost_low: 5
  cost_mid: 15
  cost_high: 30
  basis: code-audit
  synopsis: Rebases the all-features branch onto the upstream master after each pieroproietti sync, then force-pushes the
    result to the lts branch.
- name: Repo Manifest
  min_quota: 100
  cost_low: 10
  cost_mid: 40
  cost_high: 100
  basis: code-audit
  synopsis: Exports a manifest of all repos in an org, or imports repos from a manifest into a target GitHub org. Supports
    multi-platform bulk import.
- name: Setup Dashboard Variables
  min_quota: 50
  cost_low: 5
  cost_mid: 15
  cost_high: 30
  basis: code-audit
  synopsis: Sets all VITE_* repository variables required by the infra-dashboard public-dashboard build. Safe to re-run —
    blank inputs leave existing variables unchanged.
- name: Setup GitLab CI Schedules
  min_quota: 50
  cost_low: 2
  cost_mid: 5
  cost_high: 10
  basis: code-audit
  synopsis: Replaces all existing GitLab pipeline schedules in openos-project/ops/fork-sync-all with the 3 consolidated CADENCE-based
