  min_quota: 50
  cost_low: 1
  cost_mid: 2
  cost_high: 5
  basis: code-audit
  synopsis: Regenerates DOCS/generated/ pages from config sources (workflow-quota-costs.yml, priority-tiers.yml, gitlab-subgroups.yml, registered-imports.json) and commits the result.
- name: Deploy Book
  min_quota: 50
  cost_low: 5
  cost_mid: 10
  cost_high: 20
  basis: code-audit
  synopsis: Builds the mdBook documentation site from DOCS/ and deploys it to GitHub Pages at interested-deving-1896.github.io/fork-sync-all/.
- name: Mirror to OpenOS-Project-Ecosystem-OOC
  min_quota: 300
  cost_low: 20
  cost_mid: 80
  cost_high: 200
  basis: code-audit
  synopsis: Bare-clones every repo in OpenOS-Project-OSP and git push --mirror into OpenOS-Project-Ecosystem-OOC, completing the second hop of the three-org mirror chain.
- name: Pipeline Telemetry
  min_quota: 200
  cost_low: 5
  cost_mid: 15
  cost_high: 30
  basis: code-audit
  notes: 1 run fetch + 1 jobs fetch + 1 logs download (no quota) + 1 issues list + 1 issue upsert. Log download uses raw GitHub URL (no quota). High end includes paginated recent-runs fetch for rolling issue.
  synopsis: Post-run observability workflow. Fetches completed run data, builds a span tree (workflow→jobs→steps), computes Thoth-equivalent metrics, parses log severity, writes a step summary and trace artifact, and upserts a rolling metrics issue.
- name: Pre-Mirror CI Gate
  min_quota: 800
  cost_low: 50
  cost_mid: 150
  cost_high: 300
  basis: code-audit
  notes: 2 REST calls per OSP-bound repo (HEAD SHA + check-runs) × ~49 repos = ~100 calls per pass. Two passes if resolver runs.
  synopsis: Checks CI status on all OSP-bound repos in Interested-Deving-1896 before mirroring. Dispatches resolve-failures for red repos, waits, then re-checks. Blocks the mirror if repos are still failing.
- name: Verify Mirror Integrity
  min_quota: 400
  cost_low: 50
  cost_mid: 100
  cost_high: 150
  basis: code-audit
  notes: 2 REST calls per repo (source HEAD + dest HEAD) × ~49 repos = ~100 calls. GitLab pair uses GitLab API (no GitHub quota).
  synopsis: Compares default-branch HEAD SHAs between source and destination for all OSP-bound repos after a mirror stage. Reports mismatches as warnings; configurable hard-fail mode.
- name: Verify Fork Integrity
  min_quota: 100
  cost_low: 3
  cost_mid: 5
  cost_high: 8
  basis: code-audit
  notes: rate_limit (1) + repo meta (1) + upstream meta (1) + 2× HEAD SHA (2) + compare (1) = ~6 calls per run. Single-repo scope.
  synopsis: Compares this repo's default-branch HEAD against its upstream parent (or upstream_override from .ota/config.yml). Reports sync status; configurable hard-fail on drift.
- name: Post-Flush Verification
  min_quota: 300
  cost_low: 150
  cost_mid: 350
  cost_high: 600
  basis: code-audit
  notes: Runs all three integrity checks (id-1896-to-osp, osp-to-ooc, osp-to-gitlab) plus CI check on ~49 repos plus queue/quota queries. High end assumes all checks run fully.
  synopsis: End-to-end health check after full-chain-flush — mirror integrity across all three pairs, CI status on I-D-1896 OSP-bound repos, quota health, and workflow queue health.
- name: Generate NotebookLM Content
  min_quota: 50
  cost_low: 5
  cost_mid: 15
  cost_high: 30
  basis: code-audit
  notes: 1 release view + 1 release create (if new) + N upload calls (1 per artifact, up to ~10). Generation itself uses Google APIs — no GitHub quota. High end assumes new release + 10 artifacts.
  synopsis: Generates NotebookLM content artifacts (audio, video, slides, infographic, quiz, flashcards, report) for a given notebook and uploads them to a GitHub Release.
- name: Refresh NotebookLM Auth
  min_quota: 10
  cost_low: 1
  cost_mid: 2
  cost_high: 5
  basis: code-audit
  notes: 1 secret read (implicit via env) + 1 secret write (gh secret set). Cookie refresh itself uses Google APIs — no GitHub quota.
  synopsis: Rotates the short-lived __Secure-1PSIDTS cookie in NOTEBOOKLM_AUTH_JSON weekly and writes the updated state back to the repo secret.
- name: GitLab Critical Deploy
  min_quota: 50
  cost_low: 3
  cost_mid: 8
  cost_high: 15
  basis: code-audit
  notes: 1 checkout + 1 GitLab API token verify + up to 3 GitLab API calls (pipeline list, cancel, trigger). Git push itself uses no GitHub quota. High end assumes pipeline clear with many pipelines.
  synopsis: Fast-lane GitLab mirror recovery. Pushes current HEAD directly to GitLab via HTTPS, cancels pending pipelines, pauses/resumes schedules, and optionally triggers a fresh pipeline. Works even when GitHub quota is near 0.
- name: Check Accessibility
  min_quota: 500
  cost_low: 5
  cost_mid: 15
  cost_high: 40
  basis: code-audit
  notes: 1 quota pre-flight + 1 FSA mode check + 2 content fetches (accessibility-report.json, README.audio.mp3 existence) + 1 commit push (if artifacts changed). High end assumes managed mode scanning multiple repos.
  synopsis: Multi-layer accessibility audit — CODEOWNERS coverage, README screen-reader scan, WCAG 2.1 AA HTML check, audio overview (espeak-ng), and Braille output (liblouis). Commits README.audio.mp3 and README.brl artifacts.
