  min_quota: 50
  cost_low: 5
  cost_mid: 15
  cost_high: 30
  basis: code-audit
  synopsis: Checks README.md for rendering issues — leaked log lines, unclosed fences, bare brackets, raw angle brackets,
    unclosed AI markers, missing H1, and empty sections.
