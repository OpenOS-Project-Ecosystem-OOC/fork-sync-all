- name: Shallow Reclone Large GitLab Mirrors
  min_quota: 50
  cost_low: 2
  cost_mid: 5
  cost_high: 10
  basis: code-audit
  synopsis: Reduces GitLab storage usage by replacing full git history on large mirror projects with a shallow clone. Run
    when openos-project approaches its 10 GiB storage limit.
- name: Sync Registry Sources
  min_quota: 100
  cost_low: 10
  cost_mid: 40
  cost_high: 100
  basis: code-audit
  synopsis: Registry-driven upstream sync (central orchestrator) — reads a JSON registry of upstream sources and syncs
    each repo via merge-upstream or force-reset. Runs daily from fork-sync-all with penguins-eggs defaults.
- name: Sync Registry Backend
  min_quota: 100
  cost_low: 10
  cost_mid: 40
  cost_high: 100
  basis: code-audit
  synopsis: Agnostic registry sync backend propagated to upstream-sync consumers. Dispatch-only, no schedule, no hardcoded
    defaults. Reads vars.AF_REGISTRY_REPO / AF_REGISTRY_BRANCH / AF_REGISTRY_PATH for self-configuration.
