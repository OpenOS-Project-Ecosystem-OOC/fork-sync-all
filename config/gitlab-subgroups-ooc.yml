# config/gitlab-subgroups-ooc.yml
#
# Subgroup placement for the OOC → openos-project-ooc-ecosystem GitLab mirror leg.
# Mirrors the subgroup structure of gitlab-subgroups.yml (OSP leg) so that both
# OSP and OOC have matching subgroup layouts.
#
# GitLab root group: https://gitlab.com/openos-project-ooc-ecosystem
# Root namespace ID: 134901804
#
# Subgroup IDs: set to null until the subgroup is created in GitLab.
# Run mirror-osp-to-gitlab.sh with SUBGROUPS_CONFIG pointing to this file
# to create the subgroups and fill in the real IDs.
#
# Fallback: any repo not listed here is placed in the 'projects' subgroup.

default_subgroup: projects

subgroups:

  git-management_deving:
    id: null    # create at: gitlab.com/openos-project-ooc-ecosystem/git-management_deving
    path: openos-project-ooc-ecosystem/git-management_deving
    repos: []
    notes: >
      Git workflow tooling and queue management utilities.
      Mirrors OSP subgroup git-management_deving.

  penguins-eggs_deving:
