# config/workflow-cost-profiles.yml
#
# Per-workflow API cost profiles used by scripts/rate-limit-profile.sh to
# estimate whether sufficient budget exists before dispatching a workflow.
#
# Each profile declares:
#   rest_calls      — estimated GitHub REST API calls consumed per run
#   graphql_calls   — estimated GitHub GraphQL calls consumed per run
#   gitlab_calls    — estimated GitLab REST calls consumed per run (if any)
#   ai_calls        — estimated AI inference calls consumed per run (provider-agnostic;
#                     see config/ai-providers.yml for which provider is active)
#   scales_with     — variable that multiplies the base cost (e.g. repos, files)
#   scale_factor    — multiplier per unit of scales_with
#   notes           — human-readable cost breakdown
#
# Cost estimates are seeded from observed runs. scripts/rate-limit-learn.sh
# updates actual_* fields after each run completes, and the profiler uses
# a weighted average of estimated vs actual when both are present.
#
# Updated by: scripts/rate-limit-learn.sh (automated)
# Reviewed by: maintainers (periodically)

profiles:

  # ── import-repo ───────────────────────────────────────────────────────────
  # Repo creation: 1, push branches: ~3, OSP mirror: ~5, OOC mirror: ~5
  # registered-imports.json update: 2 (SHA + PUT)
  # Total: ~16 REST calls
  import-repo:
    rest_calls: 16
    graphql_calls: 0
    gitlab_calls: 3         # clone metadata probe
    ai_calls: 0
    scales_with: null
    scale_factor: 0
    minimum_rest_budget: 50
    notes: >
      Repo creation + branch push + OSP/OOC mirror setup +
      registered-imports.json write-back.

  # ── quota-reserve ─────────────────────────────────────────────────────────
  # Quota check: 1, list queued runs: 1-3, cancel per run: 1 each
  # Typical run: ~3 calls when quota is healthy (exits early), ~10 when acting
  quota-reserve:
    rest_calls: 3
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: cancelled_runs
    scale_factor: 1           # 1 cancel call per cancelled run
    minimum_rest_budget: 5    # intentionally very low — must run even at low quota
    notes: >
      Exits immediately if quota >= RESERVE_FLOOR (costs 1 call).
      When acting, costs 1-3 (list) + 1 per cancellation.
      Runs every 10 min; designed to be nearly free when quota is healthy.

  # ── critical-deploy ───────────────────────────────────────────────────────
  # Phase 1 (git push): 0 REST calls
  # Phase 2 (queue clear): same as queue-manager (~5-20 calls)
  # Phase 3 (dispatch + wait): ~5 calls per workflow dispatched
  # Total: ~30 REST calls for a typical HIGH-priority run
  critical-deploy:
    rest_calls: 30
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: workflows_dispatched
    scale_factor: 5           # ~5 calls per workflow (dispatch + poll)
    minimum_rest_budget: 50
    notes: >
      Git push (Phase 1) costs 0 quota. Queue clear (Phase 2) costs ~5-20.
      Each dispatched workflow (Phase 3) costs ~5 calls to dispatch + poll.
      Safe to run at low quota for commit-only or queue-clear-only modes.

  # ── queue-manager ─────────────────────────────────────────────────────────
  # List queued runs: 1-3 (paginated), cancel per run: 1 each
  # Typical run: ~5 REST calls when queue is shallow, ~20 during a pile-up
  queue-manager:
    rest_calls: 5
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: queued_runs
    scale_factor: 1           # 1 cancel call per cancelled run
    minimum_rest_budget: 10
    notes: >
      List queued runs (1-3 pages) + 1 cancel call per duplicate/stale run.
      Runs every 15 min; cost is negligible when queue is healthy.

  # ── rate-limit-rerun ──────────────────────────────────────────────────────
  # Scan: 1 (list runs) + N×2 (log download per failed run)
  # Re-trigger: 1 per run
  # Total: ~10 REST calls for typical scan (2h lookback, few failures)
  rate-limit-rerun:
    rest_calls: 10
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: failed_runs
    scale_factor: 3         # list + log download + dispatch per run
    minimum_rest_budget: 30
    notes: >
      Scan cost scales with number of failed runs in lookback window.
      Re-trigger adds 1 dispatch call per identified run.

  # ── rate-limit-status ─────────────────────────────────────────────────────
  # GitHub REST check: 2 (rate_limit + repo probe)
  # GitLab check: 1
  # Models check: 1
  # Total: ~4 REST calls
  rate-limit-status:
    rest_calls: 4
    graphql_calls: 0
    gitlab_calls: 1
    ai_calls: 1
    scales_with: null
    scale_factor: 0
    minimum_rest_budget: 10
    notes: >
      Lightweight status check. Safe to run even when budget is low.

  # ── sync-registered-imports ───────────────────────────────────────────────
  # Per import: clone probe + push + mirror = ~8 calls
  # Total for typical run (6 imports): ~50 REST calls
  sync-registered-imports:
    rest_calls: 50
    graphql_calls: 0
    gitlab_calls: 6         # one probe per GitLab-sourced import
    ai_calls: 0
    scales_with: imports
    scale_factor: 8
    minimum_rest_budget: 100
    notes: >
      Scales with number of registered imports. GitLab calls only for
      gitlab-platform entries.

  # ── mirror-artifacts ──────────────────────────────────────────────────────
  # Per repo: list releases + download + re-upload = ~10 calls
  # Total for typical run (5 repos): ~50 REST calls
  mirror-artifacts:
    rest_calls: 50
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 10
    minimum_rest_budget: 100
    notes: >
      Scales with number of repos being mirrored and number of release
      assets per repo.

  # ── rate-limit-aware-dispatch (this system) ───────────────────────────────
  # Budget check: 2 REST (rate_limit + graphql probe), dispatch: 1
  # Total: ~3 REST calls
  rate-limit-aware-dispatch:
    rest_calls: 3
    graphql_calls: 1
    gitlab_calls: 0
    ai_calls: 0
    scales_with: null
    scale_factor: 0
    minimum_rest_budget: 10
    notes: >
      The dispatcher itself is cheap. Budget check uses REST + GraphQL.
      Falls back to GraphQL-only status check when REST is exhausted.

  # ── sync-forks ────────────────────────────────────────────────────────────
  # Per fork: list branches (1) + compare (1) + merge (1) = ~3 calls
  # List all forks: paginated, ~1 call per 30 repos
  # Typical run (~40 forks, 2 branches each): ~125 REST calls
  sync-forks:
    rest_calls: 125
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 3         # list-branches + compare + merge per repo
    minimum_rest_budget: 300
    notes: >
      Paginates all forks then per-fork: list branches, compare with upstream,
      POST /merge-upstream. Daily schedule; 355 min timeout.

  # ── mirror-to-osp ─────────────────────────────────────────────────────────
  # List OSP repos: ~1 call per 30 repos
  # Per repo: check-runs (1) + open PRs (1) + git push (0 REST) = ~2 calls
  # Typical run (~40 repos): ~85 REST calls
  mirror-to-osp:
    rest_calls: 85
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 2         # check-runs + open-PRs gate per repo
    minimum_rest_budget: 200
    notes: >
      Hourly. Lists OSP repos, gates each on CI status + open PRs, then
      git push --mirror (no REST cost). Heaviest cost is the CI gate checks.

  # ── reconcile-org-refs ────────────────────────────────────────────────────
  # Highest-cost workflow. Per repo: search/code (1+) + GET file (1) + PUT (1)
  # Runs across OSP + OOC (~80 repos total), 3 passes.
  # Typical run: 1 000–3 000 REST calls (noted in workflow header)
  reconcile-org-refs:
    rest_calls: 2000
    graphql_calls: 10       # GraphQL org repo list for OOC pass
    gitlab_calls: 50        # GitLab blob search pass
    ai_calls: 0
    scales_with: repos
    scale_factor: 25        # search + GET + PUT per repo across 3 passes
    minimum_rest_budget: 2500
    notes: >
      Highest REST consumer. Reads file trees and contents across all OSP/OOC
      repos, rewrites org references. Hourly at :56. Workflow header documents
      1 000–3 000 calls per run on large orgs.

  # ── upstream-commits ──────────────────────────────────────────────────────
  # Per mirror org: list repos (paginated) + per repo: compare commits (1) +
  # check existing PRs (1) + open PR if needed (1) = ~3 calls/repo
  # Typical run (2 orgs × 40 repos): ~250 REST calls
  upstream-commits:
    rest_calls: 250
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 3         # compare + check-pr + open-pr per repo
    minimum_rest_budget: 400
    notes: >
      Hourly at :40. Scans OSP + OOC for direct commits not in upstream,
      opens PRs in Interested-Deving-1896. Cost scales with total mirror repos.

  # ── rebase-prs ────────────────────────────────────────────────────────────
  # Per PR: 1 detail fetch + 1 update-branch PUT + 1 comment POST (conflicts)
  # Typical run (10 PRs): ~30 REST calls
  rebase-prs:
    rest_calls: 30
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: open_prs
    scale_factor: 3         # detail + update + optional comment per PR
    minimum_rest_budget: 500
    notes: >
      Low cost. Triggered after CI completes on main and daily at 05:00 UTC.
      Conflict comments are only posted once per PR (idempotent via GitHub dedup).

  # ── upstream-prs ──────────────────────────────────────────────────────────
  # Per mirror org: list repos (paginated) + per repo: list PRs (1+) +
  # check upstream PR exists (1) + open PR if needed (1) = ~3 calls/repo
  # Typical run (2 orgs × 40 repos): ~250 REST calls
  upstream-prs:
    rest_calls: 250
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 3         # list-prs + check-upstream + open-pr per repo
    minimum_rest_budget: 400
    notes: >
      Hourly at :32. Collects open PRs from OSP/OOC mirrors and opens
      matching PRs upstream with auto-merge. Pairs with upstream-commits.

  # ── sync-pieroproietti-forks ──────────────────────────────────────────────
  # Subset of sync-forks targeting pieroproietti upstream only.
  # Per fork: list branches (1) + compare (1) + merge (1) = ~3 calls
  # Typical run (~15 forks): ~50 REST calls
  sync-pieroproietti-forks:
    rest_calls: 50
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 3         # list-branches + compare + merge per repo
    minimum_rest_budget: 100
    notes: >
      Hourly at :05. Syncs only forks whose upstream is pieroproietti.
      Cheaper than sync-forks; smaller repo set.

  # ── mirror-orgs-full ──────────────────────────────────────────────────────
  # List source repos: ~2 calls (paginated). Per repo: check/create in OSP (2)
  # + check/create in OOC (2) + git push --mirror (0 REST) = ~4 calls/repo
  # Typical run (~40 repos, both orgs): ~165 REST calls
  mirror-orgs-full:
    rest_calls: 165
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 4         # check-exists + create-if-missing per org × 2 orgs
    minimum_rest_budget: 300
    notes: >
      Daily at 10:00 UTC. Bare clone + push --mirror for all repos.
      REST cost is repo discovery and creation; git operations are free.

  # ── sync-upstream-sources ─────────────────────────────────────────────────
  # Per OSP repo: check upstream fork exists (1) + compare (1) + sync (1)
  # Typical run (~40 OSP repos): ~125 REST calls
  sync-upstream-sources:
    rest_calls: 125
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 3         # check-fork + compare + merge per repo
    minimum_rest_budget: 250
    notes: >
      Hourly. Ensures OSP repos track their upstream sources. Reports missing
      forks without auto-creating them (manual action required).

  # ── translate-readmes ─────────────────────────────────────────────────────
  # Per repo: GET README SHA (1) + AI inference call (1) + PUT commit (1)
  # Typical run (~40 repos): ~125 REST calls + 40 Models calls
  translate-readmes:
    rest_calls: 125
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 40        # one translation call per repo README
    scales_with: repos
    scale_factor: 3         # GET-sha + translate + PUT per repo
    minimum_rest_budget: 200
    notes: >
      Hourly. Reads README, calls AI provider (default: GitHub Models
      openai/gpt-4o) for translation, commits result. AI budget is the
      binding constraint for large repo sets.

# ── Routing preferences ────────────────────────────────────────────────────
# When REST budget is low, some operations can be routed to GraphQL instead.
# List operations that have a GraphQL equivalent.

graphql_alternatives:
  - operation: check_run_status      # REST: GET /actions/runs/{id}
    graphql_query: repository.object.checkSuites
    rest_cost: 1
    graphql_cost: 1
    notes: Use GraphQL when REST remaining < 100

  - operation: list_recent_commits   # REST: GET /repos/{owner}/{repo}/commits
    graphql_query: repository.defaultBranchRef.target.history
    rest_cost: 1
    graphql_cost: 1
    notes: Use GraphQL when REST remaining < 100

  - operation: check_file_exists     # REST: GET /repos/{owner}/{repo}/contents/{path}
    graphql_query: repository.object(expression)
    rest_cost: 1
    graphql_cost: 1
    notes: Use GraphQL when REST remaining < 200

  - operation: check_repo_exists     # REST: GET /repos/{owner}/{repo}
    graphql_query: repository(owner, name)
    rest_cost: 1
    graphql_cost: 1
    notes: Use GraphQL when REST remaining < 200

  # ── check-osp-ci ──────────────────────────────────────────────────────────
  check-osp-ci:
    rest_calls: 150
    graphql_calls: 1
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 3
    minimum_rest_budget: 300
    notes: >
      1 GraphQL call for repo list + ~3 REST calls per OSP-bound repo
      (check CI status, read badge, read README). ~49 repos = ~150 REST.

  # ── cleanup-branches ──────────────────────────────────────────────────────
  cleanup-branches:
    rest_calls: 200
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 4
    minimum_rest_budget: 300
    notes: >
      Lists all repos (paginated) + lists branches per repo + deletes merged
      branches. ~50 repos × 4 calls = ~200 REST.

  # ── create-readmes ────────────────────────────────────────────────────────
  create-readmes:
    rest_calls: 200
    graphql_calls: 1
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 4
    minimum_rest_budget: 300
    notes: >
      1 GraphQL tree fetch per repo + reads existing README + writes new one.
      Only acts on repos missing a README, so actual cost is usually lower.

  # ── docker-to-incus ───────────────────────────────────────────────────────
  docker-to-incus:
    rest_calls: 300
    graphql_calls: 1
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 6
    minimum_rest_budget: 500
    notes: >
      1 GraphQL tree fetch per repo to find Docker artifacts + reads Dockerfile
      + writes Incus files. Weekly Sunday run, budget-guarded.

  # ── full-chain-flush ──────────────────────────────────────────────────────
  full-chain-flush:
    rest_calls: 20
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: none
    scale_factor: 0
    minimum_rest_budget: 2000
    notes: >
      Orchestrator only — dispatches 11 downstream workflows sequentially and
      waits for each. Its own REST cost is ~20 calls (dispatches + status polls).
      Requires high minimum_rest_budget because it triggers expensive workflows.

  # ── generate-dep-graph ────────────────────────────────────────────────────
  generate-dep-graph:
    rest_calls: 100
    graphql_calls: 1
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 2
    minimum_rest_budget: 200
    notes: >
      1 GraphQL call for repo metadata + reads package manifests per repo.
      Weekly Sunday run.

  # ── inject-badges ─────────────────────────────────────────────────────────
  inject-badges:
    rest_calls: 150
    graphql_calls: 1
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 3
    minimum_rest_budget: 300
    notes: >
      1 GraphQL tree fetch + reads README + writes if badge missing.
      ~49 repos × 3 calls = ~150 REST. ETag caching reduces repeat runs.

  # ── lts-readmes ───────────────────────────────────────────────────────────
  lts-readmes:
    rest_calls: 100
    graphql_calls: 1
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 2
    minimum_rest_budget: 200
    notes: >
      Subset of update-readmes targeting LTS branches only. Monthly run.

  # ── mirror-osp-to-gitlab ──────────────────────────────────────────────────
  mirror-osp-to-gitlab:
    rest_calls: 10
    graphql_calls: 0
    gitlab_calls: 100
    ai_calls: 0
    scales_with: repos
    scale_factor: 2
    minimum_rest_budget: 50
    notes: >
      Primarily GitLab API calls (push mirrors). GitHub REST cost is minimal
      (~10 calls for repo list). GitLab calls scale with OSP-bound repos.

  # ── mirror-releases ───────────────────────────────────────────────────────
  mirror-releases:
    rest_calls: 150
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 3
    minimum_rest_budget: 300
    notes: >
      Lists releases per repo + creates missing releases in target org.
      ~50 repos × 3 calls = ~150 REST.

  # ── notify-poller ─────────────────────────────────────────────────────────
  notify-poller:
    rest_calls: 5
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: none
    scale_factor: 0
    minimum_rest_budget: 50
    notes: >
      Reads GitHub notifications with ETag caching — returns 304 Not Modified
      on most runs, costing effectively 1 REST call.

  # ── resolve-failures ──────────────────────────────────────────────────────
  resolve-failures:
    rest_calls: 400
    graphql_calls: 6
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 8
    minimum_rest_budget: 600
    notes: >
      Lists failed workflow runs across all repos + retries each. Heavy on
      both REST and GraphQL. Cost scales with number of failures.

  # ── setup-osp-mirrors ─────────────────────────────────────────────────────
  setup-osp-mirrors:
    rest_calls: 200
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 4
    minimum_rest_budget: 300
    notes: >
      Creates/updates workflow files in each OSP-bound repo. ~49 repos ×
      4 calls (read tree + read file + write file + commit) = ~200 REST.

  # ── sync-btrfs-devel-branches ─────────────────────────────────────────────
  sync-btrfs-devel-branches:
    rest_calls: 20
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: none
    scale_factor: 0
    minimum_rest_budget: 50
    notes: >
      Syncs a small fixed set of btrfs-devel branches. Low REST cost.

  # ── sync-from-gitlab ──────────────────────────────────────────────────────
  sync-from-gitlab:
    rest_calls: 30
    graphql_calls: 0
    gitlab_calls: 50
    ai_calls: 0
    scales_with: repos
    scale_factor: 1
    minimum_rest_budget: 100
    notes: >
      Reads from GitLab (50 calls) + pushes to GitHub (~30 REST).

  # ── sync-registry-sources ─────────────────────────────────────────────────
  sync-registry-sources:
    rest_calls: 150
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 3
    minimum_rest_budget: 300
    notes: >
      Reads registry manifest + updates source repos. ~50 entries × 3 calls.

  # ── sync-to-gitlab ────────────────────────────────────────────────────────
  sync-to-gitlab:
    rest_calls: 10
    graphql_calls: 0
    gitlab_calls: 100
    ai_calls: 0
    scales_with: repos
    scale_factor: 2
    minimum_rest_budget: 50
    notes: >
      Pushes repos to GitLab. GitHub REST cost minimal; GitLab API scales
      with repo count.

  # ── sync-to-gitlab-variant ────────────────────────────────────────────────
  sync-to-gitlab-variant:
    rest_calls: 10
    graphql_calls: 0
    gitlab_calls: 50
    ai_calls: 0
    scales_with: repos
    scale_factor: 1
    minimum_rest_budget: 50
    notes: >
      Variant of sync-to-gitlab for a subset of repos. Lower cost.

  # ── token-health ──────────────────────────────────────────────────────────
  token-health:
    rest_calls: 10
    graphql_calls: 0
    gitlab_calls: 5
    ai_calls: 0
    scales_with: none
    scale_factor: 0
    minimum_rest_budget: 50
    notes: >
      Checks token expiry via API headers (1 call per token). Opens/updates
      a GitHub issue if tokens need attention. Weekly Monday run.

  # ── update-infra-deps ─────────────────────────────────────────────────────
  update-infra-deps:
    rest_calls: 50
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: none
    scale_factor: 0
    minimum_rest_budget: 100
    notes: >
      Reads workflow files + opens a PR with dependency bumps. Weekly Monday.
      Low REST cost since it only touches fork-sync-all itself.

  # ── update-readmes ────────────────────────────────────────────────────────
  update-readmes:
    rest_calls: 500
    graphql_calls: 1
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 10
    minimum_rest_budget: 800
    notes: >
      Heaviest README workflow — reads + rewrites README for all OSP-bound
      repos. 1 GraphQL tree fetch + ~10 REST calls per repo × 49 repos = ~500.
      Quota-aware pacing built in (_inter_repo_sleep).

  # ── upstream-workflow-proposal ────────────────────────────────────────────
  upstream-workflow-proposal:
    rest_calls: 100
    graphql_calls: 0
    gitlab_calls: 0
    ai_calls: 0
    scales_with: repos
    scale_factor: 2
    minimum_rest_budget: 200
    notes: >
      Reads workflow files from upstream repos + opens PRs proposing updates.
      Weekly Monday run.
