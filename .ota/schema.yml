# .ota/schema.yml
#
# Reference schema for .ota/config.yml — the per-repo OTA configuration file
# that fork owners create when opting in to the OTA update system.
#
# Fork owners do not edit this file. It lives in fork-sync-all and is the
# authoritative definition of every field .ota/config.yml accepts.
#
# To opt in: run the ota-opt-in workflow_dispatch in your fork. It will
# create .ota/config.yml pre-populated with sensible defaults and open a
# registration PR against fork-sync-all/config/ota-registry.yml.
#
# ── Field reference ──────────────────────────────────────────────────────────

# enabled (boolean, required)
#   Master switch. Set to false to pause all OTA delivery without removing
#   the config file or the registry entry.
enabled: true

# repo (string, required)
#   Full repo path in owner/name format. Must match the actual GitHub repo.
repo: "owner/repo-name"

# host (string, optional, default: "github")
#   Source control host. Currently "github" only; "gitlab" reserved for future.
host: "github"

# upstream_override (string, optional)
#   Override the upstream source used for OTA payload assembly.
#   Default: the GitHub fork parent (detected automatically via API).
#   Set this when the fork's GitHub parent is not the canonical upstream,
#   e.g. a fork-of-a-fork, or a repo that tracks a different source.
#   Format: "owner/repo" (GitHub) or full URL for other hosts.
upstream_override: ""

# pinned_sha (string, managed automatically)
#   The exact upstream commit SHA that was last successfully delivered to
#   this repo by OTA. Updated by ota-self-update.yml after each sync.
#   Do not edit manually — it is the audit trail of what version you are on.
pinned_sha: ""

# pinned_at (string, managed automatically)
#   ISO-8601 timestamp of the last successful OTA sync. Set by ota-self-update.yml.
pinned_at: ""

# ota_version (string, managed automatically)
#   The semver release tag (e.g. v1.2.3) that was last delivered.
#   Updated alongside pinned_sha by ota-self-update.yml.
ota_version: ""

# mirror_chain_opt_in (boolean, optional, default: false)
#   Set to true only if this repo is part of the mirror chain
#   (Interested-Deving-1896, OpenOS-Project-OSP, OpenOS-Project-Ecosystem-OOC,
#   or gitlab.com/openos-project) and you explicitly want OTA delivery on top
#   of template sync. Mirror-chain repos are excluded from OTA by default.
#   Has no effect for non-mirror-chain repos.
mirror_chain_opt_in: false

# workflow_overrides (object, optional)
#   Fine-grained control over which .github/workflows/ files OTA manages.
#   By default, OTA owns any workflow NOT listed in template-manifest.yml profiles.
#   Use claim/disclaim to override that boundary for specific files.
#
#   claim: [...] — workflows OTA should manage even if they appear in the manifest
#   disclaim: [...] — workflows OTA should NOT touch even if not in the manifest
workflow_overrides:
  claim: []
  disclaim: []

# exclude_paths (list of glob patterns, optional)
#   Paths OTA should never write to this repo, on top of the global exclusions.
#   Matched against paths relative to the repo root.
#   Useful for files the repo manages independently (e.g. a custom README,
#   a hand-tuned CI config, or a file that conflicts with local changes).
exclude_paths: []

# include_paths (list of glob patterns, optional)
#   Paths to re-include after exclude_paths have been applied.
#   Rarely needed — use only to restore a specific file from an excluded directory.
include_paths: []

# contact (string, optional)
#   GitHub username or email of the repo owner / maintainer.
#   Used in OTA delivery PR descriptions so the right person is notified.
contact: ""

# notifications (object, optional)
#   Controls how OTA communicates updates to this repo.
notify:
  # pr (boolean, default: true)
  #   Open a PR for each OTA update. Recommended — gives the owner a chance
  #   to review before merging.
  pr: true

  # auto_merge (boolean, default: false)
  #   Automatically merge OTA PRs if all required checks pass.
  #   Only takes effect if the repo has branch protection rules that allow it.
  auto_merge: false
