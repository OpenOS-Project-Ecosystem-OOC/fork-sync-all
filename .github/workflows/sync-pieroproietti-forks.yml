name: Sync pieroproietti Forks

on:
  schedule:
    # Every 8h (offset from the daily sync at 06:00)
    - cron: "7 */8 * * *"
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Repo name substring filter (blank = all)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Report without syncing"
        required: false
        default: false
        type: boolean
      upstream_user:
        description: "Upstream GitHub user to sync from"
        required: false
        default: "pieroproietti"
        type: string

permissions:
  contents: read

concurrency:
  group: sync-pieroproietti-forks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    # 60 min hard limit; script self-limits at 50 min for a clean exit.
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync pieroproietti forks
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          UPSTREAM_USER: pieroproietti
          BUDGET_MINUTES: "55"
        run: bash scripts/sync-pieroproietti-forks.sh
      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
