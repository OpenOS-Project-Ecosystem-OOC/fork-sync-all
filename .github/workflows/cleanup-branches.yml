name: Cleanup Stale Branches

# Deletes branches that are fully merged into the default branch across
# all repos in the specified orgs. Keeps: default branch, lts, and
# upstream-commits/* branches are kept only if they have an open PR.
#
# Run manually after bulk operations (imports, merges, mirror setup)
# or on a monthly schedule to keep orgs tidy.

on:
  schedule:
    - cron: '29 4 1 * *'   # staggered off :00 boundary
  workflow_dispatch:
    inputs:
      orgs:
        description: 'Space-separated orgs/users to clean (default: I-D-1896 + OSP + OOC)'
        required: false
        type: string
        default: 'Interested-Deving-1896 OpenOS-Project-OSP OpenOS-Project-Ecosystem-OOC'
      repo_filter:
        description: 'Only clean this repo name (blank = all repos)'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Report only — no deletions'
        type: boolean
        required: false
        default: true
      force_delete:
        description: 'Also delete unmerged branches (use with caution)'
        type: boolean
        required: false
        default: false
      keep_patterns:
        description: 'Space-separated branch name patterns to always keep'
        required: false
        type: string
        default: 'lts gh-pages main master'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check FSA mode
        id: fsa
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          FSA_MANAGED: ${{ vars.FSA_MANAGED }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          source scripts/includes/fsa-mode.sh
          if fsa_is_managed; then
            echo "managed=true" >> "$GITHUB_OUTPUT"
            # In managed mode fork-sync-all runs cleanup across all three orgs.
            # Autonomous fallback: scope to this repo's owner only.
            echo "orgs=${{ inputs.orgs || 'Interested-Deving-1896 OpenOS-Project-OSP OpenOS-Project-Ecosystem-OOC' }}" >> "$GITHUB_OUTPUT"
          else
            echo "managed=false" >> "$GITHUB_OUTPUT"
            echo "orgs=${{ inputs.orgs || github.repository_owner }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cleanup stale branches
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          ORGS: ${{ steps.fsa.outputs.orgs }}
          REPO_FILTER: ${{ inputs.repo_filter || '' }}
          DRY_RUN: ${{ inputs.dry_run == false && 'false' || 'true' }}
          FORCE_DELETE: ${{ inputs.force_delete || 'false' }}
          KEEP_PATTERNS: ${{ inputs.keep_patterns || 'lts gh-pages main master' }}
          BUDGET_MINUTES: "55"
          OSP_REPOS_CONFIG: config/gitlab-subgroups.yml
        run: |
          source scripts/includes/quota-instrument.sh
          qi_begin
          bash scripts/cleanup-branches.sh
          qi_end

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
