name: Sync Docs to Book

# Skeleton workflow: copies a docs/ directory from one repo into another
# (the "book" repo), committing any changes.
#
# Plug-and-play: set SOURCE_REPO, BOOK_REPO, SOURCE_REF, and DOCS_PATH
# below for your project. No other changes needed.
#
# Trigger: repository_dispatch event (type: docs-updated) from the source
# repo, or manually via workflow_dispatch.

on:
  repository_dispatch:
    # TODO: set to the event type your source repo dispatches
    types: [eggs-docs-updated]
  workflow_dispatch:
    inputs:
      ref:
        description: "Source repo ref to sync from"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout fork-sync-all (for scripts/)
        uses: actions/checkout@v6

      - name: Checkout book repo
        uses: actions/checkout@v6
        with:
          # TODO: set to owner/repo of the book (destination) repository
          repository: ""
          token: ${{ secrets.SYNC_TOKEN }}
          path: book

      - name: Checkout source repo
        uses: actions/checkout@v6
        with:
          # TODO: set to owner/repo of the source repository
          repository: ""
          ref: ${{ github.event.client_payload.ref || inputs.ref || 'main' }}
          token: ${{ secrets.SYNC_TOKEN }}
          path: source
          # TODO: set to the subdirectory containing docs (or remove for full checkout)
          sparse-checkout: docs

      - name: Copy docs into book
        run: |
          # Mirrors each subdirectory of source/docs/ into the book root.
          # e.g. source/docs/topic/ → book/topic/
          # TODO: adjust source path if your docs live elsewhere
          for dir in source/docs/*/; do
            topic=$(basename "$dir")
            mkdir -p "book/${topic}"
            cp -r "${dir}." "book/${topic}/"
          done
          echo "Synced docs from source @ $(git -C source rev-parse --short HEAD)"

      - name: Commit and push if changed
        run: |
          cd book
          git config user.email "sync-bot@github.com"
          git config user.name "Sync Bot"
          git add .
          if git diff --cached --quiet; then
            echo "No changes — docs are already up to date."
          else
            SHA="${{ github.event.client_payload.sha }}"
            MSG="sync: update docs from source repo"
            [[ -n "$SHA" ]] && MSG="${MSG} (${SHA:0:7})"
            git commit -m "${MSG} [skip ci]"
            git push
          fi
