name: Check Accessibility

# Runs a multi-layer accessibility audit on this repo:
#   - CODEOWNERS ownership coverage (github-codeowners)
#   - README scan: alt text, link text, table headers, reading level
#   - WCAG 2.1 AA HTML scan (pa11y, if HTML docs present)
#   - Audio overview generation (espeak-ng → README.audio.mp3)
#   - Braille output (liblouis → README.brl)
#
# Artifacts (audio + Braille + JSON report) are uploaded to the run.
# In managed mode: runs against all OSP-bound repos from fork-sync-all.
# In autonomous mode: runs against this repo only.

on:
  push:
    branches: [main, master]
    paths:
      - 'README.md'
      - '.github/CODEOWNERS'
      - 'CODEOWNERS'
      - 'DOCS/generated/**'
  schedule:
    - cron: '17 4 * * 1'   # Weekly Monday 04:17 UTC
  workflow_dispatch:
    inputs:
      repo:
        description: 'Single repo to audit (blank = this repo)'
        required: false
        default: ''
        type: string
      fail_on_error:
        description: 'Exit 1 if any ERROR-level finding'
        required: false
        default: false
        type: boolean
      rate_limit_rerun:
        description: 'Set by rate-limit-rerun — prevents re-trigger loops'
        required: false
        default: 'false'
        type: string

concurrency:
  group: check-accessibility-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  audit:
    if: inputs.rate_limit_rerun != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Cache npm global packages
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-accessibility-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-accessibility-
            ${{ runner.os }}-npm-

      - name: Install accessibility tools
        run: |
          sudo apt-get update -qq
          # espeak-ng: TTS for audio overview
          sudo apt-get install -y -qq espeak-ng ffmpeg
          # liblouis: Braille translation
          sudo apt-get install -y -qq python3-louis liblouis-data
          # pa11y: WCAG HTML auditing (optional — skip if npm unavailable)
          npm install -g pa11y github-codeowners 2>/dev/null || true

      - name: Check FSA mode
        id: fsa
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          FSA_MANAGED: ${{ vars.FSA_MANAGED }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          source scripts/includes/fsa-mode.sh
          if fsa_is_managed; then
            echo "managed=true"  >> "$GITHUB_OUTPUT"
            echo "github_owner=Interested-Deving-1896" >> "$GITHUB_OUTPUT"
          else
            echo "managed=false" >> "$GITHUB_OUTPUT"
            echo "github_owner=${{ github.repository_owner }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Quota pre-flight
        id: quota
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          MIN_QUOTA: "500"
        run: |
          remaining=$(curl -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            https://api.github.com/rate_limit \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['resources']['core']['remaining'])" \
            || echo 0)
          echo "remaining=${remaining}" >> "$GITHUB_OUTPUT"
          if [[ "${remaining}" -lt "${MIN_QUOTA}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run accessibility audit
        if: steps.quota.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          OWNER: ${{ steps.fsa.outputs.github_owner }}
          REPO: ${{ inputs.repo || github.event.repository.name }}
          REPO_DIR: ${{ github.workspace }}
          OUTPUT_DIR: ${{ github.workspace }}
          AUDIO_ENABLED: 'true'
          BRAILLE_ENABLED: 'true'
          WCAG_ENABLED: 'true'
          FAIL_ON_ERROR: ${{ inputs.fail_on_error || 'false' }}
        run: bash scripts/check-accessibility.sh

      - name: Upload accessibility artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-${{ github.event.repository.name }}-${{ github.run_number }}
          path: |
            accessibility-report.json
            README.audio.mp3
            README.audio.wav
            README.brl
          if-no-files-found: ignore
          retention-days: 90

      - name: Commit audio + Braille outputs
        if: steps.quota.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.audio.mp3 README.audio.wav README.brl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No accessibility artifacts changed."
          else
            git commit -m "chore: update accessibility outputs (audio + Braille) [skip ci]"
            git pull --rebase && git push
          fi

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
