name: Translate READMEs

# Translates README.md files across Interested-Deving-1896 repos using the
# GitHub Models API (GPT-4o). Writes translated content to README.<lang>.md
# alongside the original (e.g. README.it.md for Italian).
#
# Source and target languages are selected via workflow_dispatch dropdowns.
# Translated files include a SHA watermark so re-runs only retranslate when
# the source has actually changed.
#
# Requires:
#   SYNC_TOKEN — PAT with repo + models:read scopes

on:
  schedule:
    # Daily at 10:30 UTC — moved out of 03:xx cluster.
    # Still after update-readmes (03:00) and create-readmes (07:08).
    # Full org scan (scope=all), normalize non-English READMEs to English.
    - cron: '43 10 */2 * *'  # Every 2 days at 10:43 UTC — translation content changes slowly
  # Run OSP-bound normalize pass after workflows that write README content.
  # Intentionally narrow: high-frequency triggers (Sync Registered Imports,
  # Sync pieroproietti Forks, Sync Upstream Sources) were removed because
  # each fires 3-4×/day and Translate READMEs costs ~450 REST calls/run
  # (2 calls × 225 OSP repos). The daily schedule covers the rest.
  workflow_run:
    workflows:
      - "Update READMEs"
      - "Add Mirror Repo"
    types: [completed]
  workflow_dispatch:
    inputs:
      source_lang:
        description: 'Source language'
        required: true
        type: choice
        default: 'en'
        options:
          - 'en'       # English
          - 'it'       # Italian
          - 'es'       # Spanish
          - 'fr'       # French
          - 'de'       # German
          - 'pt'       # Portuguese
          - 'zh'       # Chinese (Simplified)
          - 'zh-tw'    # Chinese (Traditional)
          - 'ja'       # Japanese
          - 'ko'       # Korean
          - 'ru'       # Russian
          - 'ar'       # Arabic
          - 'hi'       # Hindi
          - 'nl'       # Dutch
          - 'pl'       # Polish
          - 'tr'       # Turkish
          - 'sv'       # Swedish
          - 'uk'       # Ukrainian
          - 'auto'     # Auto-detect from content

      target_lang:
        description: 'Target language'
        required: true
        type: choice
        default: 'it'
        options:
          - 'en'       # English
          - 'it'       # Italian
          - 'es'       # Spanish
          - 'fr'       # French
          - 'de'       # German
          - 'pt'       # Portuguese
          - 'zh'       # Chinese (Simplified)
          - 'zh-tw'    # Chinese (Traditional)
          - 'ja'       # Japanese
          - 'ko'       # Korean
          - 'ru'       # Russian
          - 'ar'       # Arabic
          - 'hi'       # Hindi
          - 'nl'       # Dutch
          - 'pl'       # Polish
          - 'tr'       # Turkish
          - 'sv'       # Swedish
          - 'uk'       # Ukrainian

      scope:
        description: 'Predefined repo group to translate'
        required: true
        type: choice
        default: 'all'
        options:
          - all           # Every repo in Interested-Deving-1896
          - osp-bound     # Repos mirrored to OpenOS-Project-OSP (from config/gitlab-subgroups.yml)
          - custom        # Use the "Repos" field below

      repos:
        description: 'Repos to translate — space-separated (only used when scope=custom)'
        required: false
        type: string
        default: ''

      force:
        description: 'Retranslate even if source is unchanged'
        type: boolean
        default: false

      dry_run:
        description: 'Report without committing'
        type: boolean
        default: false
      normalize_to_english:
        description: 'Auto-detect each README language; translate non-English ones to English in place (overrides source/target lang)'
        type: boolean
        default: false

permissions:
  contents: write

# ── Rate limits ───────────────────────────────────────────────────────────────
# GitHub Models API: quota varies by model and plan. GPT-4o has a per-minute
# and per-day token limit. The script retries HTTP 429 with Retry-After sleep
# (up to 3×) and exits 0 on full quota exhaustion so the job doesn't fail red.
# GitHub REST API (SYNC_TOKEN): 5 000 req/hr for file reads/writes.

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # Large orgs with many repos may take a while

    steps:
      - name: Quota pre-flight
        id: quota
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          MIN_QUOTA: "1500"
        run: |
          remaining=$(curl -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/rate_limit \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['resources']['core']['remaining'])" \
            || echo 0)
          echo "remaining=${remaining}" >> "$GITHUB_OUTPUT"
          if [[ "${remaining}" -lt "${MIN_QUOTA}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Quota too low (${remaining} < ${MIN_QUOTA}) — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Check FSA mode
        id: fsa
        if: steps.quota.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          FSA_MANAGED: ${{ vars.FSA_MANAGED }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          source scripts/includes/fsa-mode.sh
          if fsa_is_managed; then
            echo "managed=true" >> "$GITHUB_OUTPUT"
            # Managed: org-wide sweep across I-D-1896.
            echo "github_owner=Interested-Deving-1896" >> "$GITHUB_OUTPUT"
            echo "scope=${{ github.event_name == 'schedule' && 'all' || github.event_name == 'workflow_run' && 'osp-bound' || inputs.scope }}" >> "$GITHUB_OUTPUT"
          else
            echo "managed=false" >> "$GITHUB_OUTPUT"
            # Autonomous: scope to this repo's owner, single-repo scan.
            echo "github_owner=${{ github.repository_owner }}" >> "$GITHUB_OUTPUT"
            echo "scope=single" >> "$GITHUB_OUTPUT"
          fi

      - name: Translate READMEs
        if: steps.quota.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GITHUB_OWNER: ${{ steps.fsa.outputs.github_owner }}
          # Scheduled and workflow_run triggers always normalize non-English
          # READMEs to English (auto-detect source, target=en, full scan).
          # Manual runs use the selected source/target unless normalize_to_english is set.
          SOURCE_LANG: ${{ github.event_name == 'schedule' && 'auto' || github.event_name == 'workflow_run' && 'auto' || inputs.normalize_to_english && 'auto' || inputs.source_lang }}
          TARGET_LANG: ${{ github.event_name == 'schedule' && 'en' || github.event_name == 'workflow_run' && 'en' || inputs.normalize_to_english && 'en' || inputs.target_lang }}
          NORMALIZE_TO_EN: ${{ github.event_name == 'schedule' && 'true' || github.event_name == 'workflow_run' && 'true' || inputs.normalize_to_english || 'false' }}
          SCOPE: ${{ steps.fsa.outputs.scope }}
          REPOS: ${{ inputs.repos || '' }}
          FORCE: ${{ inputs.force || 'false' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          MODEL: openai/gpt-4o
          BUDGET_MINUTES: "115"
        run: bash scripts/translate-readmes.sh
      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

