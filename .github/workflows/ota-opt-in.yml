name: OTA Opt-In

# Propagated to opted-in forks via the standalone template profile.
#
# Fork owners run this workflow_dispatch once to:
#   1. Create .ota/config.yml in their fork (pre-populated with defaults)
#   2. Open a registration PR against fork-sync-all/config/ota-registry.yml
#
# After running this workflow, the fork will:
#   - Appear in fork-sync-all's registry (once the PR is merged or discovered)
#   - Receive OTA updates via ota-self-update.yml on a schedule
#   - Receive OTA delivery PRs from fork-sync-all on each new release

on:
  workflow_dispatch:
    inputs:
      contact:
        description: "Your GitHub username (for PR notifications)"
        required: false
        default: ""
        type: string
      upstream_override:
        description: "Override upstream source (owner/repo). Leave blank to use fork parent."
        required: false
        default: ""
        type: string
      auto_merge:
        description: "Auto-merge OTA PRs when checks pass"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  opt-in:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Write .ota/config.yml
        env:
          CONTACT: ${{ inputs.contact }}
          UPSTREAM_OVERRIDE: ${{ inputs.upstream_override }}
          AUTO_MERGE: ${{ inputs.auto_merge }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p .ota

          cat > .ota/config.yml << YAML
# .ota/config.yml — OTA update configuration for ${REPO}
# Generated by ota-opt-in workflow on $(date -u +%Y-%m-%d).
# See .ota/schema.yml in fork-sync-all for full field documentation.

enabled: true
repo: "${REPO}"
host: github
upstream_override: "${UPSTREAM_OVERRIDE}"
pinned_sha: ""
pinned_at: ""
ota_version: ""
mirror_chain_opt_in: false

workflow_overrides:
  claim: []
  disclaim: []

exclude_paths: []
include_paths: []

contact: "${CONTACT}"

notify:
  pr: true
  auto_merge: ${AUTO_MERGE}
YAML

          echo "Created .ota/config.yml for ${REPO}"

      - name: Commit .ota/config.yml
        run: |
          git config user.name "ota-opt-in"
          git config user.email "ota@fork-sync-all"
          git add .ota/config.yml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: opt in to OTA updates

Enables OTA update delivery from fork-sync-all.
See https://github.com/Interested-Deving-1896/fork-sync-all for details.

Co-authored-by: Ona <no-reply@ona.com>"
          git push origin HEAD

      - name: Open registration PR against fork-sync-all
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN || secrets.GH_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          CONTACT: ${{ inputs.contact }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)

          # Build the new registry entry
          NEW_ENTRY="  - repo: \"${REPO}\"
            host: github
            registered_at: \"${TODAY}\"
            pinned_sha: \"\"
            discovery: false
            mirror_chain_opt_in: false
            disabled: false"

          PR_BODY="## OTA Opt-In Registration

**Repo:** \`${REPO}\`
**Contact:** ${CONTACT:-_not provided_}
**Date:** ${TODAY}

The owner of \`${REPO}\` has run the \`ota-opt-in\` workflow and opted in to OTA updates from fork-sync-all.

### Registry entry to add

\`\`\`yaml
${NEW_ENTRY}
\`\`\`

Merging this PR adds the repo to \`config/ota-registry.yml\` so it receives OTA delivery PRs on each new release.

To reject this opt-in, close the PR without merging."

          # Open PR against fork-sync-all
          curl -s -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/Interested-Deving-1896/fork-sync-all/issues" \
            -d "$(python3 -c "
import json, sys
print(json.dumps({
  'title': 'OTA opt-in: ${REPO}',
  'body': sys.stdin.read(),
  'labels': ['ota-registration']
}))
" <<< "$PR_BODY")" | python3 -c "
import sys, json
d = json.load(sys.stdin)
print('Registration issue opened:', d.get('html_url', 'unknown'))
"
