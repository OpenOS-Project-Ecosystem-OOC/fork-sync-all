name: Rebuild LTS Branch

# Skeleton workflow: rebases a long-lived feature branch onto the upstream
# default branch and force-pushes the result to an LTS branch.
#
# Plug-and-play: set the env vars below (or override via workflow_dispatch
# inputs) for your project. No other changes needed.
#
# Typical use case:
#   - You maintain a fork with a persistent "all-features" branch
#   - You want an "lts" branch that is always rebased onto upstream master
#   - This runs automatically after your upstream sync workflow completes
#
# Trigger: runs after the workflow named in UPSTREAM_SYNC_WORKFLOW succeeds,
# or manually via workflow_dispatch.

on:
  workflow_run:
    workflows:
      # TODO: set to the name of your upstream sync workflow
      - "Sync pieroproietti Forks"
    types: [completed]
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Branch to rebase onto (upstream default)"
        required: false
        default: "master"
      feature_branch:
        description: "Branch whose commits to rebase"
        required: false
        default: "all-features"
      lts_branch:
        description: "Branch to force-push the result to"
        required: false
        default: "lts"

permissions:
  contents: read

jobs:
  rebase-lts:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout fork-sync-all
        uses: actions/checkout@v6

      - name: Rebuild LTS branch
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          # TODO: set to owner/repo of the target repository
          TARGET_REPO: ""
          BASE_BRANCH:    ${{ inputs.base_branch    || 'master' }}
          FEATURE_BRANCH: ${{ inputs.feature_branch || 'all-features' }}
          LTS_BRANCH:     ${{ inputs.lts_branch     || 'lts' }}
        run: |
          if [[ -z "$TARGET_REPO" ]]; then
            echo "TARGET_REPO is not set — skipping. Set it in the workflow env."
            exit 0
          fi
          bash scripts/rebase-lts.sh

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
