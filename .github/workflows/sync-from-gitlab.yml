name: Sync from GitLab

# DEPRECATED — superseded by git-platform-sync.yml (direction=pull).
# Kept as a no-op stub so that any workflow_run triggers referencing
# "Sync from GitLab" by name continue to resolve without error.
# Remove this file once all downstream references have been updated.

on:
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Sync only this repo name (leave blank for all)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Report without pushing to GitHub"
        required: false
        default: false
        type: boolean
      subgroup_filter:
        description: "Only sync repos from this GitLab subgroup"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - penguins-eggs_deving
          - immutable-filesystem_deving
          - linux-kernel_filesystem_deving
          - incus_deving
          - ops
      rate_limit_rerun:
        description: "Set by rate-limit-rerun workflow — prevents re-trigger loops"
        required: false
        default: "false"
        type: string

concurrency:
  group: sync-from-gitlab
  cancel-in-progress: true

# ── Rate limits ──────────────────────────────────────────────────────────────
# GitLab REST API (GITLAB_SYNC_TOKEN): 2 000 req/min per token.
#   gl_api_get() retries HTTP 429/403 with RateLimit-Reset sleep (up to 3×).
# GitHub REST API (SYNC_TOKEN): 5 000 req/hr — used for repo existence checks.
#   gh_api_check() retries HTTP 403/429 with X-RateLimit-Reset sleep.

jobs:
  deprecated-stub:
    name: "Deprecated — use git-platform-sync.yml"
    if: inputs.rate_limit_rerun != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Redirect notice
        run: |
          echo "This workflow is deprecated. Use 'Git Platform Sync' (git-platform-sync.yml) with direction=pull instead." >&2
          echo "Dispatching git-platform-sync.yml is equivalent to running this workflow." >&2
