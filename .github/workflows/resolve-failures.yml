name: Resolve CI Failures

on:
  schedule:
    - cron: "30 7 * * *" # Daily at 07:30 UTC (after sync-forks at 06:00)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan and resolve failures
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          SCAN_OWNERS: "Interested-Deving-1896 OpenOS-Project-OSP OpenOS-Project-Ecosystem-OOC"
        run: bash scripts/resolve-failures.sh
