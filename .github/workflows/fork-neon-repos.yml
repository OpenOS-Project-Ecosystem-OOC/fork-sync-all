name: Import External Repos

# Skeleton workflow: imports one or more repos from an external Git host
# (GitHub, GitLab, Gitea, etc.) into GITHUB_OWNER and pushes them through
# the OSP → OOC mirror chain.
#
# Plug-and-play: edit the matrix below to list the repos you want to import.
# Set source_url to the full clone URL and target_name to the desired repo
# name under GITHUB_OWNER.
#
# After the initial import, add the repos to registered-imports.json so
# sync-registered-imports.yml keeps them up to date automatically.

on:
  workflow_dispatch:
    inputs:
      mirror_to_osp_ooc:
        description: "Push through OSP → OOC mirror chain after import"
        type: boolean
        required: false
        default: true
      dry_run:
        description: "Dry run — print what would happen without making changes"
        type: boolean
        required: false
        default: false

concurrency:
  group: import-external-repos
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        repo:
          # TODO: replace with the repos you want to import
          # - source_url: https://github.com/some-org/some-repo
          #   target_name: some-repo
          # - source_url: https://gitlab.com/some-group/another-repo
          #   target_name: another-repo
          - source_url: ""
            target_name: ""

    steps:
      - uses: actions/checkout@v6

      - name: Import ${{ matrix.repo.target_name }}
        env:
          GH_TOKEN:          ${{ secrets.SYNC_TOKEN }}
          REPO_URL:          ${{ matrix.repo.source_url }}
          REPO_NAME:         ${{ matrix.repo.target_name }}
          MIRROR_TO_OSP_OOC: ${{ inputs.mirror_to_osp_ooc }}
          ONGOING_SYNC:      "false"
          GITHUB_OWNER:      Interested-Deving-1896
          OSP_ORG:           OpenOS-Project-OSP
          OOC_ORG:           OpenOS-Project-Ecosystem-OOC
          GITLAB_TOKEN:      ${{ secrets.GITLAB_SYNC_TOKEN }}
          DRY_RUN:           ${{ inputs.dry_run }}
        run: |
          if [[ -z "$REPO_URL" || -z "$REPO_NAME" ]]; then
            echo "source_url and target_name must be set in the matrix — skipping."
            exit 0
          fi
          bash scripts/import-repo.sh

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
