name: Quota Wait + Trigger

# Polls the GitHub core rate limit and dispatches a target workflow once
# quota recovers above a configurable threshold.
#
# The poll interval is recalculated on every iteration from the live reset
# epoch returned by the API — so if the reset slides (because another workflow
# fires and exhausts quota again), the sleep adjusts automatically.
#
# Typical use: dispatch this workflow when quota is exhausted and you want
# sync-template (or any other workflow) to run as soon as quota recovers,
# without having to watch the clock manually.
#
# The runner timeout is set to 3h to cover the worst-case sliding reset window.

on:
  workflow_dispatch:
    inputs:
      target_workflow:
        description: "Workflow file to dispatch when quota recovers"
        required: true
        type: string
        default: "sync-template.yml"

      target_inputs:
        description: "JSON object of inputs to pass to the target workflow"
        required: false
        type: string
        default: '{"mode":"propagate"}'

      target_ref:
        description: "Git ref to dispatch the target workflow on"
        required: false
        type: string
        default: "main"

      min_quota:
        description: "Minimum core API calls remaining before dispatching"
        required: false
        type: string
        default: "2000"

      buffer_sec:
        description: "Extra seconds to wait after the reset epoch before dispatching"
        required: false
        type: string
        default: "45"

      timeout_min:
        description: "Give up after this many minutes (max 170 due to runner limit)"
        required: false
        type: string
        default: "170"

      dry_run:
        description: "Poll and report without actually dispatching"
        required: false
        type: boolean
        default: false

concurrency:
  group: quota-wait-trigger-${{ inputs.target_workflow }}
  cancel-in-progress: true   # A newer dispatch supersedes an in-flight wait

permissions:
  actions: write   # needed to dispatch the target workflow
  contents: read

jobs:
  wait-and-trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 175   # 170m user timeout + 5m buffer for setup/teardown
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Wait for quota and dispatch
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GITHUB_OWNER: Interested-Deving-1896
          GITHUB_REPO: fork-sync-all
          TARGET_WORKFLOW: ${{ inputs.target_workflow }}
          TARGET_INPUTS: ${{ inputs.target_inputs }}
          TARGET_REF: ${{ inputs.target_ref }}
          MIN_QUOTA: ${{ inputs.min_quota }}
          BUFFER_SEC: ${{ inputs.buffer_sec }}
          MIN_POLL_SEC: "30"
          MAX_POLL_SEC: "300"
          TIMEOUT_MIN: ${{ inputs.timeout_min }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: bash scripts/quota-wait-trigger.sh

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
