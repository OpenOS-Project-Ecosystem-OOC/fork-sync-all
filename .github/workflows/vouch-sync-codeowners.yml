name: Vouch Sync Codeowners

# Weekly: syncs CODEOWNERS entries into VOUCHED.td.
# Also runs vouch-seed.sh to pick up any new org members or past PR authors.
# Opens a PR if VOUCHED.td changed.

on:
  schedule:
    - cron: '23 4 * * 1'   # Weekly on Mondays at 04:23 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Report changes without opening a PR'
        required: false
        default: false
        type: boolean

concurrency:
  group: vouch-sync-codeowners
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync Codeowners → VOUCHED.td
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run vouch seed
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          REPO: ${{ github.repository }}
          VOUCHED_FILE: .github/VOUCHED.td
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: bash scripts/vouch-seed.sh

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet .github/VOUCHED.td; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff .github/VOUCHED.td
          fi

      - name: Open PR with changes
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          branch="vouch/sync-codeowners-$(date +%Y%m%d)"
          git config user.name "vouch-bot"
          git config user.email "vouch@fork-sync-all"
          git checkout -b "$branch"
          git add .github/VOUCHED.td
          git commit -m $'chore(vouch): sync CODEOWNERS + org members into VOUCHED.td [skip ci]\n\nAuto-generated by vouch-sync-codeowners.yml.\n\nCo-authored-by: Ona <no-reply@ona.com>'
          git push origin "$branch"
          gh pr create \
            --title "chore(vouch): sync CODEOWNERS + org members into VOUCHED.td" \
            --base main \
            --head "$branch" \
            --body $'Weekly sync of CODEOWNERS entries and org members into `.github/VOUCHED.td`.\n\nAuto-generated by `vouch-sync-codeowners.yml`. Safe to merge.'
