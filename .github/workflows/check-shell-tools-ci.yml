name: Check Shell Tools CI

# Checks CI status across all 24 shell-tools repos in Interested-Deving-1896.
# Reports: last workflow run status, ShellCheck pass/fail, open PRs, staleness.
# Uses GraphQL to batch-fetch run data — minimal quota cost.

on:
  schedule:
    - cron: '30 6 * * 1'  # Monday 06:30 UTC
  workflow_dispatch:
    inputs:
      tool_filter:
        description: 'Check only this tool (blank = all)'
        required: false
        default: ''
        type: string
      fail_on_red:
        description: 'Exit non-zero if any repo has a failing workflow'
        required: false
        default: false
        type: boolean

concurrency:
  group: check-shell-tools-ci
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Check shell-tools CI status
    runs-on: ubuntu-latest
    steps:
      - name: Quota pre-flight
        id: quota
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          remaining=$(curl -sf \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/rate_limit" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['resources']['core']['remaining'])" \
            2>/dev/null || echo 0)
          echo "remaining=$remaining" >> "$GITHUB_OUTPUT"
          if [[ "$remaining" -lt 300 ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.quota.outputs.skip == 'false'

      - name: Fetch CI status via GraphQL
        if: steps.quota.outputs.skip == 'false'
        id: ci_status
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          TOOL_FILTER: ${{ inputs.tool_filter || '' }}
          FAIL_ON_RED: ${{ inputs.fail_on_red || 'false' }}
        run: |
          source scripts/includes/quota-instrument.sh
          qi_begin
          python3 - config/shell-tools-registry.yml "$TOOL_FILTER" "$FAIL_ON_RED" << 'PYEOF'
          import yaml, sys, json, urllib.request, os

          registry_file, tool_filter, fail_on_red = sys.argv[1], sys.argv[2], sys.argv[3]
          token = os.environ['GH_TOKEN']
          org = 'Interested-Deving-1896'

          with open(registry_file) as f:
              config = yaml.safe_load(f)

          tools = config.get('tools', [])
          seen = set()
          repos = []
          for t in tools:
              if t['repo'] not in seen:
                  seen.add(t['repo'])
                  repos.append(t['repo'])

          if tool_filter:
              repos = [r for r in repos if tool_filter.lower() in r.lower()]

          # Build GraphQL aliases — one query for all repos
          aliases = []
          for repo in repos:
              safe = repo.replace('-','_').replace('.','_').replace(' ','_')
              aliases.append(
                  f'{safe}: repository(owner:"{org}", name:"{repo}") {{ '
                  f'name defaultBranchRef {{ name target {{ ... on Commit {{ '
                  f'pushedDate checkSuites(last:1) {{ nodes {{ conclusion status '
                  f'workflowRun {{ workflow {{ name }} createdAt }} }} }} }} }} }} '
                  f'pullRequests(states:OPEN) {{ totalCount }} isArchived }}'
              )

          query = '{ ' + ' '.join(aliases) + ' }'
          payload = json.dumps({'query': query}).encode()
          req = urllib.request.Request(
              'https://api.github.com/graphql', data=payload,
              headers={'Authorization': f'token {token}', 'Content-Type': 'application/json'}
          )
          with urllib.request.urlopen(req, timeout=30) as r:
              data = json.load(r)

          results = data.get('data', {})
          rows = []
          red_repos = []

          for repo in repos:
              safe = repo.replace('-','_').replace('.','_').replace(' ','_')
              info = results.get(safe) or {}
              if not info:
                  rows.append({'repo': repo, 'status': 'NOT_FOUND', 'conclusion': '-', 'prs': 0, 'workflow': '-', 'pushed': '-'})
                  continue

              archived = info.get('isArchived', False)
              prs = info.get('pullRequests', {}).get('totalCount', 0)
              branch = info.get('defaultBranchRef') or {}
              target = branch.get('target') or {}
              pushed = target.get('pushedDate', '-')
              suites = target.get('checkSuites', {}).get('nodes', [])

              if suites:
                  suite = suites[-1]
                  status     = suite.get('status', 'UNKNOWN')
                  conclusion = suite.get('conclusion') or 'IN_PROGRESS'
                  wf_run     = suite.get('workflowRun') or {}
                  wf_name    = (wf_run.get('workflow') or {}).get('name', '-')
                  created_at = wf_run.get('createdAt', '-')
              else:
                  status, conclusion, wf_name, created_at = 'NO_RUNS', '-', '-', '-'

              if conclusion in ('FAILURE', 'TIMED_OUT', 'CANCELLED') and not archived:
                  red_repos.append(repo)

              rows.append({
                  'repo': repo, 'status': status, 'conclusion': conclusion,
                  'prs': prs, 'workflow': wf_name, 'pushed': (pushed or '-')[:10],
                  'archived': archived
              })

          # Print summary table
          print(f"\n{'REPO':<45} {'STATUS':<12} {'CONCLUSION':<14} {'PRS':>4} {'PUSHED':<12} {'WORKFLOW'}")
          print('-' * 110)
          for r in sorted(rows, key=lambda x: x['repo']):
              flag = '🗄' if r.get('archived') else ('❌' if r['conclusion'] in ('FAILURE','TIMED_OUT') else ('✅' if r['conclusion'] == 'SUCCESS' else '⚪'))
              print(f"{flag} {r['repo']:<43} {r['status']:<12} {r['conclusion']:<14} {r['prs']:>4} {r['pushed']:<12} {r['workflow']}")

          print(f"\nTotal: {len(rows)} repos | Red: {len(red_repos)} | Green: {sum(1 for r in rows if r['conclusion']=='SUCCESS')}")

          if red_repos:
              print(f"\nFailing repos: {', '.join(red_repos)}")

          if fail_on_red == 'true' and red_repos:
              sys.exit(1)
          PYEOF

      - name: Write step summary
        if: always() && steps.quota.outputs.skip == 'false'
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: |
          qi_end
          echo "## Shell Tools CI Status" >> "$GITHUB_STEP_SUMMARY"
          echo "Run at: $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "See job log for full table." >> "$GITHUB_STEP_SUMMARY"
          bash scripts/write-summary.sh
