name: Cancel Stale Runs

# Cancels queued and in-progress workflow runs that are either:
#   (a) older than MAX_AGE_MINUTES (default 90) — covers any run that has
#       outlived the longest legitimate workflow timeout, or
#   (b) created before the fix commit that triggered this workflow — ensures
#       pre-fix runs don't burn quota after a patch lands on main.
#
# Available as workflow_dispatch for manual one-shot cleanup.
# Push trigger removed — firing on every workflow file change consumed ~800
# calls per push cancelling its own queue, defeating the purpose.
#
# Safeguards:
#   - Never cancels itself
#   - Never cancels runs created after the triggering commit
#   - Never cancels manually-dispatched runs (event: workflow_dispatch)
#     unless explicitly opted in via cancel_manual_runs input
#   - Quota pre-flight: skips if core remaining < MIN_QUOTA (2000)
#   - Concurrency group: only one instance runs at a time

on:
  workflow_dispatch:
    inputs:
      max_age_minutes:
        description: "Cancel runs older than this many minutes (default 90)"
        required: false
        default: "90"
        type: string
      dry_run:
        description: "Report what would be cancelled without actually cancelling"
        required: false
        default: "false"
        type: boolean
      cancel_manual_runs:
        description: "Also cancel manually-dispatched (workflow_dispatch) runs"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: cancel-stale-runs
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  cancel:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Quota pre-flight
        id: quota
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          MIN_QUOTA: "2000"
        run: |
          remaining=$(curl -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/rate_limit \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['resources']['core']['remaining'])" \
            || echo 0)
          echo "remaining=${remaining}" >> "$GITHUB_OUTPUT"
          if [[ "${remaining}" -lt "${MIN_QUOTA}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Quota too low (${remaining} < ${MIN_QUOTA}) — skipping cancel run."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Quota OK: ${remaining} remaining."
          fi

      - name: Cancel stale runs
        if: steps.quota.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          REPO: ${{ github.repository }}
          THIS_RUN_ID: ${{ github.run_id }}
          # On push: use the commit timestamp as the cutoff.
          # On dispatch: use MAX_AGE_MINUTES only (no commit cutoff).
          FIX_COMMIT_TS: ${{ github.event_name == 'push' && github.event.head_commit.timestamp || '' }}
          MAX_AGE_MINUTES: ${{ inputs.max_age_minutes || '90' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          CANCEL_MANUAL_RUNS: ${{ inputs.cancel_manual_runs || 'false' }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, json, urllib.request, urllib.error
          from datetime import datetime, timezone, timedelta

          token       = os.environ["GH_TOKEN"]
          repo        = os.environ["REPO"]
          this_run    = int(os.environ["THIS_RUN_ID"])
          fix_ts_raw  = os.environ.get("FIX_COMMIT_TS", "").strip()
          max_age_min = int(os.environ.get("MAX_AGE_MINUTES", "90"))
          dry_run     = os.environ.get("DRY_RUN", "false").lower() == "true"
          cancel_manual = os.environ.get("CANCEL_MANUAL_RUNS", "false").lower() == "true"

          now = datetime.now(timezone.utc)
          age_cutoff = now - timedelta(minutes=max_age_min)

          # Parse fix commit timestamp if available (push trigger)
          fix_cutoff = None
          if fix_ts_raw:
              try:
                  fix_cutoff = datetime.fromisoformat(fix_ts_raw.replace("Z", "+00:00"))
              except ValueError:
                  print(f"Could not parse FIX_COMMIT_TS '{fix_ts_raw}' — using age cutoff only.")

          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def gh_get(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def gh_post(url, data=None):
              body = json.dumps(data or {}).encode()
              req = urllib.request.Request(url, data=body, headers={**headers, "Content-Type": "application/json"}, method="POST")
              try:
                  with urllib.request.urlopen(req) as r:
                      return r.status
              except urllib.error.HTTPError as e:
                  return e.code

          # Collect all queued + in_progress runs (paginate)
          candidates = []
          page = 1
          while True:
              url = (f"https://api.github.com/repos/{repo}/actions/runs"
                     f"?status=queued&per_page=100&page={page}")
              data = gh_get(url)
              runs = data.get("workflow_runs", [])
              if not runs:
                  break
              candidates.extend(runs)
              if len(runs) < 100:
                  break
              page += 1

          page = 1
          while True:
              url = (f"https://api.github.com/repos/{repo}/actions/runs"
                     f"?status=in_progress&per_page=100&page={page}")
              data = gh_get(url)
              runs = data.get("workflow_runs", [])
              if not runs:
                  break
              candidates.extend(runs)
              if len(runs) < 100:
                  break
              page += 1

          cancelled = []
          skipped   = []

          for run in candidates:
              run_id    = run["id"]
              wf_name   = run["name"]
              event     = run["event"]
              created   = datetime.fromisoformat(run["created_at"].replace("Z", "+00:00"))
              status    = run["status"]

              # Never cancel ourselves
              if run_id == this_run:
                  skipped.append((run_id, wf_name, "self"))
                  continue

              # Skip manually-dispatched runs unless opted in
              if event == "workflow_dispatch" and not cancel_manual:
                  skipped.append((run_id, wf_name, "manual-dispatch"))
                  continue

              # Determine if stale: pre-fix OR over age limit
              pre_fix  = fix_cutoff is not None and created < fix_cutoff
              too_old  = created < age_cutoff

              if not (pre_fix or too_old):
                  skipped.append((run_id, wf_name, "recent"))
                  continue

              reason = []
              if pre_fix:
                  reason.append(f"pre-fix (created {created.strftime('%H:%M UTC')} < fix {fix_cutoff.strftime('%H:%M UTC')})")
              if too_old:
                  reason.append(f"age >{max_age_min}min")

              reason_str = ", ".join(reason)
              print(f"{'[DRY] ' if dry_run else ''}Cancel run {run_id} ({wf_name}, {status}) — {reason_str}")

              if not dry_run:
                  cancel_url = f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/cancel"
                  status_code = gh_post(cancel_url)
                  if status_code in (202, 204):
                      cancelled.append(run_id)
                  else:
                      print(f"  WARNING: cancel returned HTTP {status_code} for run {run_id}")
              else:
                  cancelled.append(run_id)

          print(f"\nSummary: {len(cancelled)} cancelled, {len(skipped)} skipped")
          if skipped:
              for run_id, name, reason in skipped[:10]:
                  print(f"  skip {run_id} ({name}): {reason}")
              if len(skipped) > 10:
                  print(f"  ... and {len(skipped) - 10} more")

          # Write step summary
          summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary_file:
              with open(summary_file, "a") as f:
                  f.write(f"### Cancel Stale Runs\n\n")
                  f.write(f"- **Cancelled**: {len(cancelled)}\n")
                  f.write(f"- **Skipped**: {len(skipped)}\n")
                  f.write(f"- **Dry run**: {dry_run}\n")
                  if fix_cutoff:
                      f.write(f"- **Fix cutoff**: {fix_cutoff.strftime('%Y-%m-%d %H:%M UTC')}\n")
                  f.write(f"- **Age cutoff**: >{max_age_min} min ({age_cutoff.strftime('%Y-%m-%d %H:%M UTC')})\n")
          PYEOF
