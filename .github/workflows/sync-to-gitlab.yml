name: Sync to GitLab

# DEPRECATED — superseded by git-platform-sync.yml (direction=push).
# Kept as a no-op stub so that any workflow_run triggers referencing
# "Sync to GitLab" by name continue to resolve without error.
# Remove this file once all downstream references have been updated.

on:
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Push only this repo name (leave blank for all)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Report without pushing to GitLab"
        required: false
        default: false
        type: boolean
      force:
        description: "Force-push even if GitLab branch has diverged"
        required: false
        default: false
        type: boolean
      rate_limit_rerun:
        description: "Set by rate-limit-rerun workflow — prevents re-trigger loops"
        required: false
        default: "false"
        type: string

concurrency:
  group: sync-to-gitlab
  cancel-in-progress: true

# ── Rate limits ──────────────────────────────────────────────────────────────
# No REST API calls — only git clone + git push operations.
# Rate limiting manifests as git push rejections from GitLab.
# git_push_retry() retries up to 3 times with linear backoff (15 s, 30 s,
#   45 s). GitLab enforces per-project push limits; the retry loop handles
#   transient rejections without failing the workflow.

jobs:
  deprecated-stub:
    name: "Deprecated — use git-platform-sync.yml"
    if: inputs.rate_limit_rerun != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Redirect notice
        run: |
          echo "This workflow is deprecated. Use 'Git Platform Sync' (git-platform-sync.yml) with direction=push instead." >&2
          echo "Dispatching git-platform-sync.yml is equivalent to running this workflow." >&2
