name: Update Workflow Triggers Doc

# Regenerates docs/workflow-triggers.md and docs/workflow-triggers.txt
# whenever a workflow file is added, changed, or removed on main.
# Commits the result directly to main.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'config/workflow-quota-costs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-workflow-triggers-doc
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Regenerate docs
        run: python3 scripts/generate-workflow-triggers-doc.py .

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp docs/workflow-triggers.md DOCS/workflow-triggers.md
          git add docs/workflow-triggers.md docs/workflow-triggers.txt DOCS/workflow-triggers.md
          if git diff --cached --quiet; then
            echo "No changes to docs — skipping commit."
          else
            git commit -m "docs(auto): regenerate workflow triggers doc"
            git pull --rebase && git push
          fi
      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
