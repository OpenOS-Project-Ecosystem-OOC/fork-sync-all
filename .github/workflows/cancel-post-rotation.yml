name: Cancel Runs After Token Rotation

# When Rotate Secret Token completes, any workflow that was queued or
# running before the rotation started holds the old (now-invalid) token.
# Those runs will fail with "Bad credentials" and burn quota retrying.
# This workflow cancels them immediately after rotation finishes.
#
# Safeguards inherited from cancel-stale-runs.yml:
#   - Never cancels itself
#   - Never cancels runs created after the rotation started
#   - Never cancels manually-dispatched runs
#   - Quota pre-flight: skips if core remaining < 500

on:
  workflow_run:
    workflows:
      - "Rotate Secret Token"
    types: [completed]

concurrency:
  group: cancel-post-rotation
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  cancel:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Quota pre-flight
        id: quota
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          MIN_QUOTA: "500"
        run: |
          source scripts/includes/quota-snapshot.sh
          quota_snapshot

      - name: Cancel pre-rotation queued/in-progress runs
        if: steps.quota.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          REPO: ${{ github.repository }}
          THIS_RUN_ID: ${{ github.run_id }}
          # Use the rotation run's created_at as the cutoff — anything
          # queued before the rotation started has the old token.
          ROTATION_STARTED_AT: ${{ github.event.workflow_run.created_at }}
          ROTATION_RUN_ID: ${{ github.event.workflow_run.id }}
          ROTATION_NAME: ${{ github.event.workflow_run.name }}
        run: |
          python3 - << 'PYEOF'
          import os, json, sys, urllib.request, urllib.error
          from datetime import datetime, timezone

          def dual(dt):
              """Return 'YYYY-MM-DD HH:MM UTC / H:MM AM/PM UTC' for a datetime."""
              s24 = dt.strftime('%Y-%m-%d %H:%M UTC')
              s12 = dt.strftime('%I:%M %p UTC').lstrip('0') or '12:00 AM UTC'
              return f"{s24} / {s12}"

          def dual_time(dt):
              """Return 'HH:MM UTC / H:MM AM/PM UTC' (no date) for a datetime."""
              s24 = dt.strftime('%H:%M UTC')
              s12 = dt.strftime('%I:%M %p UTC').lstrip('0') or '12:00 AM UTC'
              return f"{s24} / {s12}"

          token            = os.environ["GH_TOKEN"]
          repo             = os.environ["REPO"]
          this_run         = int(os.environ["THIS_RUN_ID"])
          rotation_run_id  = int(os.environ["ROTATION_RUN_ID"])
          rotation_name    = os.environ["ROTATION_NAME"]
          rotation_started = datetime.fromisoformat(
              os.environ["ROTATION_STARTED_AT"].replace("Z", "+00:00"))

          print(f"Rotation: {rotation_name} (run {rotation_run_id})")
          print(f"Cutoff: runs created before {dual(rotation_started)}")
          print("")

          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github+json",
          }

          def gh_get(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def gh_cancel(run_id):
              url = f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/cancel"
              req = urllib.request.Request(url, data=b"{}", headers=headers, method="POST")
              try:
                  with urllib.request.urlopen(req) as r:
                      return r.status
              except urllib.error.HTTPError as e:
                  return e.code

          # Collect queued + in_progress runs
          candidates = []
          for status in ("queued", "in_progress"):
              page = 1
              while True:
                  url = (f"https://api.github.com/repos/{repo}/actions/runs"
                         f"?status={status}&per_page=100&page={page}")
                  data = gh_get(url)
                  runs = data.get("workflow_runs", [])
                  if not runs:
                      break
                  candidates.extend(runs)
                  if len(runs) < 100:
                      break
                  page += 1

          cancelled = []
          skipped   = []

          for run in candidates:
              run_id  = run["id"]
              name    = run["name"]
              event   = run["event"]
              created = datetime.fromisoformat(run["created_at"].replace("Z", "+00:00"))

              # Never cancel ourselves or the rotation run
              if run_id in (this_run, rotation_run_id):
                  skipped.append((run_id, name, "self/rotation"))
                  continue

              # Skip manually-dispatched runs — user may have started them intentionally
              if event == "workflow_dispatch":
                  skipped.append((run_id, name, "manual-dispatch"))
                  continue

              # Only cancel runs that started before the rotation
              if created >= rotation_started:
                  skipped.append((run_id, name, "post-rotation"))
                  continue

              code = gh_cancel(run_id)
              if code in (202, 204):
                  print(f"  Cancelled: {name} (run {run_id}, created {dual_time(created)})")
                  cancelled.append(run_id)
              else:
                  print(f"  WARNING: HTTP {code} cancelling run {run_id} ({name})")

          print("")
          print(f"Summary: {len(cancelled)} cancelled, {len(skipped)} skipped")

          summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary:
              with open(summary, "a") as f:
                  f.write("## Cancel Runs After Token Rotation\n\n")
                  f.write(f"Triggered by: **{rotation_name}**\n\n")
                  f.write(f"- **Cancelled**: {len(cancelled)}\n")
                  f.write(f"- **Skipped**: {len(skipped)}\n")
                  f.write(f"- **Cutoff**: runs created before {dual(rotation_started)}\n")
          PYEOF
      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
