name: Token Health Monitor

on:
  schedule:
    - cron: '24 9 * * 1'  # staggered off sync-to-gitlab :17
  workflow_dispatch:
    inputs:
      warn_days:
        description: 'Days before expiry to start warning'
        required: false
        type: string
        default: '45'
      stale_days:
        description: 'Days since last rotation before flagging as stale'
        required: false
        type: string
        default: '90'

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check token health
        id: check
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_SYNC_TOKEN }}
          REPO: ${{ github.repository }}
          WARN_DAYS: ${{ inputs.warn_days || '30' }}
          STALE_DAYS: ${{ inputs.stale_days || '90' }}
        run: |
          bash scripts/token-monitor.sh && echo "needs_attention=false" >> "$GITHUB_OUTPUT" \
            || echo "needs_attention=true" >> "$GITHUB_OUTPUT"

      - name: Open or update alert issue
        if: steps.check.outputs.needs_attention == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          existing=$(gh issue list \
            --repo "$REPO" \
            --label "token-monitor" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          # Embed the specific problem list written by token-monitor.sh
          issues_detail=""
          if [[ -f /tmp/token-monitor-issues.md ]]; then
            issues_detail=$(cat /tmp/token-monitor-issues.md)
          fi

          {
            printf '## Token Monitor Alert\n\n'
            printf '%s\n\n' "$issues_detail"
            printf '---\n\n'
            printf '**To rotate a repo secret (SYNC_TOKEN, GH_SYNC_TOKEN, etc.):**\n'
            printf '1. Generate a new PAT at https://github.com/settings/tokens\n'
            printf '2. Run the [Rotate Secret Token workflow](https://github.com/%s/actions/workflows/rotate-token.yml) — select the secret name and paste the new value into `token_value`\n\n' "$REPO"
            printf '**To rotate an OSP org secret (ORG_MIRROR_OSP_TO_OOC, MIRROR_TOKEN):**\n'
            printf '1. Generate a new PAT at https://github.com/settings/tokens\n'
            printf '2. Update the secret at https://github.com/organizations/OpenOS-Project-OSP/settings/secrets/actions\n'
            printf '3. Update the expiry date in `scripts/token-monitor.sh` and `AGENTS.md`\n\n'
            printf '**Other links:**\n'
            printf '- [GitLab PATs](https://gitlab.com/-/user_settings/personal_access_tokens)\n'
            printf '- [Token rotation guide in AGENTS.md](https://github.com/%s/blob/main/AGENTS.md#token-rotation)\n\n' "$REPO"
            printf '_This issue is managed automatically by the Token Monitor workflow. It will be closed when all tokens are healthy._\n\n'
            printf 'See the [workflow run summary](%s) for the full token status table.\n' "$RUN_URL"
          } > /tmp/issue-body.md

          if [[ -n "$existing" ]]; then
            comment_body="$(printf '**Updated %s:** Token health re-run.\n\n%s\n\nSee [run summary](%s) for the full status table.' \
              "$(date -u +%Y-%m-%d)" "$issues_detail" "$RUN_URL")"
            gh issue comment "$existing" \
              --repo "$REPO" \
              --body "$comment_body"
            echo "Updated existing issue #${existing}"
          else
            issue_body="$(cat /tmp/issue-body.md)"
            gh issue create \
              --repo "$REPO" \
              --title "Token Monitor: action required" \
              --body "$issue_body" \
              --label "token-monitor"
            echo "Created new alert issue"
          fi

      - name: Close alert issue if all healthy
        if: steps.check.outputs.needs_attention == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          existing=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "token-monitor" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [[ -n "$existing" ]]; then
            gh issue close "$existing" \
              --repo "${{ github.repository }}" \
              --comment "All tokens are healthy as of $(date -u +%Y-%m-%d). Closing."
            echo "Closed issue #${existing}"
          else
            echo "No open alert issue — nothing to close."
          fi

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
