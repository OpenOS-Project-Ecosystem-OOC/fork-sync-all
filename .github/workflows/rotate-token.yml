name: Rotate Secret Token

# Paste a new token value to update any named secret in this repo or in the
# OpenOS-Project-OSP org. Platform-agnostic: works for GitHub PATs, GitLab
# PATs, Bitbucket app passwords, Gitea tokens, or any other credential.
#
# The token value is passed as a workflow input and is never logged —
# GitHub Actions masks any value that matches a secret, and the script
# pipes the value directly into the Secrets API without echoing it.
#
# After updating, the workflow:
#   1. Validates the new token against its platform API (where supported)
#   2. Optionally commits updated expiry dates to token-monitor.sh + AGENTS.md
#
# OSP org secrets (ORG_MIRROR_OSP_TO_OOC, MIRROR_TOKEN) require that
# SYNC_TOKEN has admin:org scope on OpenOS-Project-OSP.

on:
  workflow_dispatch:
    inputs:
      secret_name:
        description: 'Secret to update'
        required: true
        type: choice
        options:
          - SYNC_TOKEN
          - GITLAB_SYNC_TOKEN
          - GH_SYNC_TOKEN
          - BITBUCKET_TOKEN
          - GITEA_TOKEN
          - ADD_MIRROR_REPO_SYNC
          - ORG_MIRROR_OSP_TO_OOC
          - MIRROR_TOKEN
      token_value:
        description: 'New token value (masked in logs — paste here)'
        required: true
        type: string
      new_expiry_date:
        description: 'New expiry date (YYYY-MM-DD) — auto-detected from platform API if left blank'
        required: false
        type: string
        default: ''
      validate:
        description: 'Validate token against its platform API before storing'
        required: false
        type: boolean
        default: true

run-name: "rotate ${{ inputs.secret_name }}"

permissions:
  contents: write  # needed to commit expiry date updates to token-monitor.sh + AGENTS.md

# ── Security note ─────────────────────────────────────────────────────────────
# token_value is a workflow input, not a pre-existing secret, so GitHub does
# not automatically mask it in logs. The script never echoes the value — it
# pipes it via stdin to `gh secret set --body` and immediately overwrites the
# shell variable. The updated secret is then masked for all subsequent steps.

jobs:
  rotate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Python deps for OSP org secret rotation
        if: inputs.secret_name == 'ORG_MIRROR_OSP_TO_OOC' || inputs.secret_name == 'MIRROR_TOKEN'
        run: pip install --quiet pynacl cryptography PyJWT

      - name: Update secret and validate
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          SECRET_NAME: ${{ inputs.secret_name }}
          TOKEN_VALUE: ${{ inputs.token_value }}
          NEW_EXPIRY_DATE: ${{ inputs.new_expiry_date }}
          VALIDATE: ${{ inputs.validate }}
          REPO: ${{ github.repository }}
          # OSP org token resolution (first available wins):
          #   OSP_APP_ID + OSP_APP_PRIVATE_KEY — GitHub App (preferred, no expiry)
          #   OSP_ADMIN_TOKEN                  — PAT with admin:org on OpenOS-Project-OSP
          OSP_APP_ID: ${{ secrets.OSP_APP_ID || '' }}
          OSP_APP_PRIVATE_KEY: ${{ secrets.OSP_APP_PRIVATE_KEY || '' }}
          OSP_ADMIN_TOKEN: ${{ secrets.OSP_ADMIN_TOKEN || '' }}
        run: bash scripts/rotate-token.sh
      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
