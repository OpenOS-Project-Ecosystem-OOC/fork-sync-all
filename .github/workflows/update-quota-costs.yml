name: Update Quota Cost Registry

# Reads quota-instrument records from the last 30 run step summaries for each
# instrumented workflow, computes p50/p95 REST call consumption, and commits
# updated cost_low/cost_mid/cost_high values back to
# config/workflow-quota-costs.yml with basis: observed.
#
# Only updates entries where at least 5 observed samples exist — below that
# threshold the code-audit estimates are more reliable than noisy measurements.
#
# Schedule: weekly on Monday at 08:00 UTC — low-frequency, low-priority.
# Also available via workflow_dispatch for manual refresh.

on:
  schedule:
    - cron: '0 8 * * 1'   # Weekly Monday 08:00 UTC
  workflow_dispatch:
    inputs:
      min_samples:
        description: "Minimum samples required before updating an entry"
        required: false
        default: "5"
        type: string
      dry_run:
        description: "Print what would change without committing"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

concurrency:
  group: update-quota-costs
  cancel-in-progress: true

jobs:
  update:
    name: Compute observed quota costs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Quota pre-flight
        id: quota
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          MIN_QUOTA: "200"
        run: |
          remaining=$(curl -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/rate_limit" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['resources']['core']['remaining'])" \
            || echo 0)
          echo "remaining=${remaining}" >> "$GITHUB_OUTPUT"
          if [[ "${remaining}" -lt "${MIN_QUOTA}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Quota too low (${remaining} < ${MIN_QUOTA}) — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.quota.outputs.skip == 'false'
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Collect and compute observed costs
        if: steps.quota.outputs.skip == 'false'
        id: compute
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          REPO: ${{ github.repository }}
          MIN_SAMPLES: ${{ inputs.min_samples || '5' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re, sys, urllib.request, yaml
          from datetime import datetime, timezone
          from statistics import median, quantiles

          token   = os.environ["GH_TOKEN"]
          repo    = os.environ["REPO"]
          api     = "https://api.github.com"
          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github+json",
          }
          min_samples = int(os.environ.get("MIN_SAMPLES", "5"))
          dry_run     = os.environ.get("DRY_RUN", "false").lower() == "true"

          # Instrumented workflows — must match workflow name: field exactly
          instrumented = [
              "Sync All Forks",
              "Inject Built-with-Ona Badges",
              "Reconcile Org References",
              "Cleanup Stale Branches",
              "Check OSP-Bound CI Status",
          ]

          # ── Fetch recent run summaries for each workflow ──────────────────
          # GraphQL: list workflow runs by name, fetch step summary URL
          # Step summaries are fetched via REST (no GraphQL equivalent)

          def get_workflow_runs(workflow_name, limit=30):
              """Return list of run IDs for a workflow by name."""
              page = 1
              runs = []
              while len(runs) < limit:
                  url = f"{api}/repos/{repo}/actions/runs?per_page=100&page={page}"
                  req = urllib.request.Request(url, headers=headers)
                  try:
                      with urllib.request.urlopen(req) as r:
                          data = json.loads(r.read())
                  except Exception:
                      break
                  batch = [
                      r for r in data.get("workflow_runs", [])
                      if r.get("name") == workflow_name
                      and r.get("conclusion") in ("success", "failure")
                  ]
                  runs.extend(batch)
                  if len(data.get("workflow_runs", [])) < 100:
                      break
                  page += 1
              return runs[:limit]

          def get_run_summary(run_id):
              """Fetch step summary text for a run's first job."""
              # Get jobs for this run
              url = f"{api}/repos/{repo}/actions/runs/{run_id}/jobs"
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req) as r:
                      jobs = json.loads(r.read()).get("jobs", [])
              except Exception:
                  return ""
              if not jobs:
                  return ""
              # Step summaries are stored as logs — fetch via logs URL
              # Actually, step summaries are in the job's steps output
              # We stored them as HTML comments in GITHUB_STEP_SUMMARY
              # which is accessible via the check run annotations API
              # Simpler: fetch the job log and grep for our marker
              job_id = jobs[0]["id"]
              log_url = f"{api}/repos/{repo}/actions/jobs/{job_id}/logs"
              req = urllib.request.Request(log_url, headers=headers)
              try:
                  # Logs redirect — follow redirect
                  import urllib.error
                  with urllib.request.urlopen(req) as r:
                      return r.read().decode("utf-8", errors="replace")
              except Exception:
                  return ""

          # ── Parse quota-instrument records from logs ──────────────────────
          MARKER = re.compile(
              r'<!--\s*quota-instrument:\s*(\{[^}]+\})\s*-->'
          )
          # Also check plain log output format from qi_end stderr
          LOG_MARKER = re.compile(
              r'\[quota-instrument\]\s+after=\d+\s+delta=(\d+)'
          )

          samples = {name: [] for name in instrumented}

          for wf_name in instrumented:
              print(f"Fetching runs for: {wf_name}", flush=True)
              runs = get_workflow_runs(wf_name, limit=30)
              print(f"  Found {len(runs)} completed runs", flush=True)
              for run in runs:
                  log_text = get_run_summary(run["id"])
                  # Try structured HTML comment first
                  for m in MARKER.finditer(log_text):
                      try:
                          record = json.loads(m.group(1))
                          delta = record.get("delta", 0)
                          if delta >= 0:
                              samples[wf_name].append(delta)
                      except Exception:
                          pass
                  # Fall back to plain log marker
                  if not samples[wf_name]:
                      for m in LOG_MARKER.finditer(log_text):
                          samples[wf_name].append(int(m.group(1)))

          # ── Compute p50/p95 and update config ─────────────────────────────
          config_path = "config/workflow-quota-costs.yml"
          with open(config_path) as f:
              config = yaml.safe_load(f)

          updated = []
          skipped = []

          for wf in (config.get("workflows") or []):
              name = wf.get("name", "")
              if name not in samples:
                  continue
              s = sorted(samples[name])
              if len(s) < min_samples:
                  skipped.append(f"{name}: only {len(s)} samples (need {min_samples})")
                  continue

              p50 = int(median(s))
              p95 = int(quantiles(s, n=20)[18]) if len(s) >= 10 else max(s)
              p05 = int(quantiles(s, n=20)[0])  if len(s) >= 10 else min(s)

              old = (wf.get("cost_low"), wf.get("cost_mid"), wf.get("cost_high"))
              new = (p05, p50, p95)

              if old != new or wf.get("basis") != "observed":
                  wf["cost_low"]  = p05
                  wf["cost_mid"]  = p50
                  wf["cost_high"] = p95
                  wf["basis"]     = "observed"
                  wf["samples"]   = len(s)
                  wf["updated_at"] = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
                  updated.append(
                      f"{name}: low={p05} mid={p50} high={p95} "
                      f"(was low={old[0]} mid={old[1]} high={old[2]}, n={len(s)})"
                  )

          print("\n── Results ──────────────────────────────────────────────")
          if updated:
              print(f"Updated {len(updated)} workflow(s):")
              for u in updated:
                  print(f"  ✅ {u}")
          else:
              print("No updates needed.")
          if skipped:
              print(f"\nSkipped {len(skipped)} (insufficient samples):")
              for s in skipped:
                  print(f"  ⏭  {s}")

          if dry_run:
              print("\nDry run — not writing changes.")
              sys.exit(0)

          if updated:
              with open(config_path, "w") as f:
                  yaml.dump(config, f, default_flow_style=False, allow_unicode=True, sort_keys=False)
              print(f"\nWrote {config_path}")
              # Signal to next step
              with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as out:
                  out.write(f"updated_count={len(updated)}\n")
                  out.write("changes=true\n")
          else:
              with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as out:
                  out.write("updated_count=0\n")
                  out.write("changes=false\n")
          PYEOF

      - name: Commit updated costs
        if: steps.quota.outputs.skip == 'false' && steps.compute.outputs.changes == 'true' && inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/workflow-quota-costs.yml
          git diff --cached --quiet && exit 0
          git commit -m "chore: update quota cost registry with observed p50/p95 values

          Updated ${{ steps.compute.outputs.updated_count }} workflow(s) from
          observed run measurements. basis changed from code-audit to observed
          for updated entries.

          Co-authored-by: Ona <no-reply@ona.com>"
          git push

      - name: Write summary
        if: always()
        env:
          SKIP: ${{ steps.quota.outputs.skip }}
          CHANGES: ${{ steps.compute.outputs.changes || 'false' }}
          UPDATED: ${{ steps.compute.outputs.updated_count || '0' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          {
            echo "## Update Quota Cost Registry"
            echo ""
            if [[ "$SKIP" == "true" ]]; then
              echo "⏭ Skipped — quota too low."
            elif [[ "$CHANGES" == "true" ]]; then
              echo "✅ Updated **${UPDATED}** workflow cost estimate(s) with observed p50/p95 values."
            else
              echo "✅ No updates needed — all estimates are current."
            fi
            [[ "$DRY_RUN" == "true" ]] && echo "" && echo "_Dry run — no changes committed._"
          } >> "$GITHUB_STEP_SUMMARY"
