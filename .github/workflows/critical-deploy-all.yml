name: Critical Deploy — All

# Fast-lane critical deploy across all four platforms in sequence:
#   1. Interested-Deving-1896 (source org)
#   2. OpenOS-Project-OSP (GitHub mirror)
#   3. OpenOS-Project-Ecosystem-OOC (GitHub mirror)
#   4. GitLab (openos-project/fork-sync-all)
#
# Each platform runs as a separate job. Jobs 2–4 depend on job 1 completing
# so the source org is always updated first. OSP and OOC run in parallel
# after the source org job, then GitLab runs last.
#
# Use this when an issue affects all platforms simultaneously (e.g. a broken
# config file, a token rotation, a quota cascade). For single-platform issues
# use the scoped variants to avoid wasting quota on unaffected orgs.
#
# Inputs are forwarded identically to all four platforms. If a platform-
# specific override is needed, run the scoped workflow directly instead.

on:
  workflow_dispatch:
    inputs:
      commit_files:
        description: 'Phase 1 — Space-separated file paths to commit + push (all platforms)'
        type: string
        required: false
        default: ''
      commit_message:
        description: 'Commit message for Phase 1'
        type: string
        required: false
        default: 'chore: critical deploy fix [skip ci]'
      cancel_workflows:
        description: 'Phase 2 — Workflow filenames to cancel (blank = all queued)'
        type: string
        required: false
        default: ''
      stale_queue_min:
        description: 'Phase 2 — Cancel runs queued longer than N minutes'
        type: string
        required: false
        default: '10'
      workflows:
        description: 'Phase 3 — Space-separated workflow filenames to dispatch'
        type: string
        required: false
        default: ''
      workflow_inputs:
        description: 'Phase 3 — JSON inputs for dispatched workflows'
        type: string
        required: false
        default: '{}'
      # GitLab-specific phase toggles (forwarded to the GitLab job only)
      push_to_gitlab:
        description: 'GitLab Phase 1 — Push current HEAD to GitLab mirror'
        type: boolean
        required: false
        default: true
      clear_pipelines:
        description: 'GitLab Phase 2 — Cancel all pending/running GitLab pipelines'
        type: boolean
        required: false
        default: true
      pause_schedules:
        description: 'GitLab Phase 3a — Pause all GitLab schedules'
        type: boolean
        required: false
        default: false
      resume_schedules:
        description: 'GitLab Phase 3a — Resume all GitLab schedules'
        type: boolean
        required: false
        default: false
      trigger_pipeline:
        description: 'GitLab Phase 3b — Trigger a fresh GitLab pipeline after deploy'
        type: boolean
        required: false
        default: false
      trigger_cadence:
        description: 'CADENCE for triggered GitLab pipeline (daily / weekly / poller)'
        type: string
        required: false
        default: 'daily'
      dry_run:
        description: 'Dry run — report without making changes (all platforms)'
        type: boolean
        required: false
        default: false

concurrency:
  group: critical-deploy-all
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  # ── Job 0: Sentinel — holds a runner slot for the full pipeline duration ──
  sentinel:
    name: Runner Sentinel
    runs-on: ubuntu-latest
    needs: []
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Keepalive — hold runner slot
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          max_seconds=$(( 85 * 60 ))
          elapsed=0
          echo "[sentinel] Holding runner slot for critical-deploy-all run ${GITHUB_RUN_ID}" >&2
          while [[ ${elapsed} -lt ${max_seconds} ]]; do
            sleep 60
            elapsed=$(( elapsed + 60 ))
            completed=$(curl -sf -H "Authorization: token ${GH_TOKEN}" \
              "https://api.github.com/repos/${REPO}/actions/runs/${GITHUB_RUN_ID}/jobs" \
              | python3 -c "import json,sys; jobs=json.load(sys.stdin).get('jobs',[]); deploy_jobs=[j for j in jobs if j.get('name','').startswith('Deploy')]; done=all(j.get('status')=='completed' for j in deploy_jobs) if deploy_jobs else False; print('true' if done else 'false')" \
              2>/dev/null || echo "false")
            [[ "$completed" == "true" ]] && echo "[sentinel] All deploy jobs completed — releasing" >&2 && exit 0
            echo "[sentinel] [${elapsed}s] Waiting for deploy jobs..." >&2
          done
          echo "[sentinel] Max time reached — releasing" >&2

  # ── Job 1: Source org (Interested-Deving-1896) ──────────────────────────
  deploy-source:
    name: Deploy — Interested-Deving-1896
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Reserve pipeline (set FLUSH_ACTIVE)
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          REPO: ${{ github.repository }}
          PIPELINE_LABEL: "critical-deploy-all"
        run: |
          source scripts/includes/pipeline-guard.sh
          pipeline_guard_start

      - name: Critical deploy — Interested-Deving-1896
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          TARGET_ORG: Interested-Deving-1896
          TARGET_REPO: fork-sync-all
          COMMIT_FILES: ${{ inputs.commit_files }}
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
          CANCEL_WORKFLOWS: ${{ inputs.cancel_workflows }}
          STALE_QUEUE_MIN: ${{ inputs.stale_queue_min }}
          WORKFLOWS: ${{ inputs.workflows }}
          WORKFLOW_INPUTS: ${{ inputs.workflow_inputs }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          source scripts/includes/quota-instrument.sh
          qi_begin
          bash scripts/critical-deploy-github.sh

      - name: Release pipeline on failure (clear FLUSH_ACTIVE)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          REPO: ${{ github.repository }}
          PIPELINE_LABEL: "critical-deploy-all"
        run: |
          source scripts/includes/pipeline-guard.sh
          pipeline_guard_end

      - name: Write summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          DEPLOY_TARGET: Interested-Deving-1896
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: |
          source scripts/includes/quota-instrument.sh
          qi_end
          bash scripts/write-summary.sh

  # ── Job 1b: Quota checkpoint before OSP + OOC ────────────────────────────
  quota-checkpoint-1:
    name: Quota Checkpoint (pre-OSP/OOC)
    runs-on: ubuntu-latest
    needs: deploy-source
    if: always() && !cancelled()
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Quota checkpoint
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          REPO: ${{ github.repository }}
          PIPELINE_LABEL: "critical-deploy-all"
        run: |
          source scripts/includes/pipeline-guard.sh
          pipeline_guard_checkpoint 300 "pre-OSP/OOC"

  # ── Job 2: OSP mirror (runs after quota checkpoint) ─────────────────────
  deploy-osp:
    name: Deploy — OSP
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quota-checkpoint-1
    if: always() && !cancelled()
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Critical deploy — OSP
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          TARGET_ORG: OpenOS-Project-OSP
          TARGET_REPO: fork-sync-all
          COMMIT_FILES: ${{ inputs.commit_files }}
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
          CANCEL_WORKFLOWS: ${{ inputs.cancel_workflows }}
          STALE_QUEUE_MIN: ${{ inputs.stale_queue_min }}
          WORKFLOWS: ${{ inputs.workflows }}
          WORKFLOW_INPUTS: ${{ inputs.workflow_inputs }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          source scripts/includes/quota-instrument.sh
          qi_begin
          bash scripts/critical-deploy-github.sh

      - name: Write summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          DEPLOY_TARGET: OpenOS-Project-OSP
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: |
          source scripts/includes/quota-instrument.sh
          qi_end
          bash scripts/write-summary.sh

  # ── Job 3: OOC mirror (parallel with OSP, after quota checkpoint) ────────
  deploy-ooc:
    name: Deploy — OOC
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quota-checkpoint-1
    if: always() && !cancelled()
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Critical deploy — OOC
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          TARGET_ORG: OpenOS-Project-Ecosystem-OOC
          TARGET_REPO: fork-sync-all
          COMMIT_FILES: ${{ inputs.commit_files }}
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
          CANCEL_WORKFLOWS: ${{ inputs.cancel_workflows }}
          STALE_QUEUE_MIN: ${{ inputs.stale_queue_min }}
          WORKFLOWS: ${{ inputs.workflows }}
          WORKFLOW_INPUTS: ${{ inputs.workflow_inputs }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          source scripts/includes/quota-instrument.sh
          qi_begin
          bash scripts/critical-deploy-github.sh

      - name: Write summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          DEPLOY_TARGET: OpenOS-Project-Ecosystem-OOC
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: |
          source scripts/includes/quota-instrument.sh
          qi_end
          bash scripts/write-summary.sh

  # ── Job 3b: Quota checkpoint before GitLab ───────────────────────────────
  quota-checkpoint-2:
    name: Quota Checkpoint (pre-GitLab)
    runs-on: ubuntu-latest
    needs: [deploy-osp, deploy-ooc]
    if: always() && !cancelled()
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Quota checkpoint
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          REPO: ${{ github.repository }}
          PIPELINE_LABEL: "critical-deploy-all"
        run: |
          source scripts/includes/pipeline-guard.sh
          pipeline_guard_checkpoint 300 "pre-GitLab"

  # ── Job 4: GitLab (runs after quota checkpoint 2) ────────────────────────
  deploy-gitlab:
    name: Deploy — GitLab
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quota-checkpoint-2
    if: always() && !cancelled()
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Critical deploy — GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_SYNC_TOKEN }}
          PUSH_TO_GITLAB: ${{ inputs.push_to_gitlab }}
          CLEAR_PIPELINES: ${{ inputs.clear_pipelines }}
          PAUSE_SCHEDULES: ${{ inputs.pause_schedules }}
          RESUME_SCHEDULES: ${{ inputs.resume_schedules }}
          TRIGGER_PIPELINE: ${{ inputs.trigger_pipeline }}
          TRIGGER_CADENCE: ${{ inputs.trigger_cadence }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          source scripts/includes/quota-instrument.sh
          qi_begin
          bash scripts/critical-deploy-gitlab.sh

      - name: Release pipeline (clear FLUSH_ACTIVE)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          REPO: ${{ github.repository }}
          PIPELINE_LABEL: "critical-deploy-all"
        run: |
          source scripts/includes/pipeline-guard.sh
          pipeline_guard_end

      - name: Write summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          DEPLOY_TARGET: GitLab
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: |
          source scripts/includes/quota-instrument.sh
          qi_end
          bash scripts/write-summary.sh
