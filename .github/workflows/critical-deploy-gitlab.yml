name: GitLab Critical Deploy

# Fast-lane for deploying critical fixes to the GitLab mirror when the system
# is in a degraded state (quota exhaustion, stale mirror, broken schedules).
#
# Three composable phases — enable only what you need:
#
#   Phase 1 — Git push
#     Pushes current HEAD directly to gitlab.com/openos-project/ops/fork-sync-all.
#     Uses git push over HTTPS — never consumes GitLab compute minutes.
#     Use this when the GitHub→GitLab mirror sync is broken (GitHub quota at 0,
#     or GITLAB_SYNC_TOKEN expired) and a fix needs to reach GitLab immediately.
#
#   Phase 2 — Pipeline clear
#     Cancels all pending/running pipelines in the GitLab project.
#     Use this to stop a quota drain from a stuck pipeline queue.
#
#   Phase 3 — Schedule management + trigger
#     Pause or resume GitLab schedules (stops/restores the compute minute drain).
#     Optionally trigger a fresh pipeline with a specific CADENCE.
#
# Requires: GITLAB_SYNC_TOKEN (api + write_repository scope on openos-project)

on:
  workflow_dispatch:
    inputs:
      push_to_gitlab:
        description: 'Phase 1 — Push current HEAD to GitLab mirror'
        type: boolean
        required: false
        default: true
      clear_pipelines:
        description: 'Phase 2 — Cancel all pending/running GitLab pipelines'
        type: boolean
        required: false
        default: true
      pause_schedules:
        description: 'Phase 3a — Pause all GitLab schedules (stops minute drain)'
        type: boolean
        required: false
        default: false
      resume_schedules:
        description: 'Phase 3a — Resume all GitLab schedules (after fix is deployed)'
        type: boolean
        required: false
        default: false
      trigger_pipeline:
        description: 'Phase 3b — Trigger a fresh GitLab pipeline after deploy'
        type: boolean
        required: false
        default: false
      trigger_cadence:
        description: 'CADENCE for triggered pipeline (daily / weekly / poller)'
        type: string
        required: false
        default: 'daily'
      dry_run:
        description: 'Dry run — report without making changes'
        type: boolean
        required: false
        default: false

concurrency:
  group: critical-deploy-gitlab
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sentinel:
    name: Runner Sentinel
    runs-on: ubuntu-latest
    needs: []
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Keepalive — hold runner slot
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          max_seconds=$(( 17 * 60 ))
          elapsed=0
          echo "[sentinel] Holding runner slot for critical-deploy-gitlab run ${GITHUB_RUN_ID}" >&2
          while [[ ${elapsed} -lt ${max_seconds} ]]; do
            sleep 60; elapsed=$(( elapsed + 60 ))
            status=$(curl -sf -H "Authorization: token ${GH_TOKEN}" \
              "https://api.github.com/repos/${REPO}/actions/runs/${GITHUB_RUN_ID}/jobs" \
              | python3 -c "import json,sys; jobs=[j for j in json.load(sys.stdin).get('jobs',[]) if j.get('name')=='GitLab Critical Deploy']; print(jobs[0].get('status','unknown') if jobs else 'unknown')" \
              2>/dev/null || echo "unknown")
            [[ "$status" == "completed" ]] && exit 0
            echo "[sentinel] [${elapsed}s] status: ${status}" >&2
          done

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Reserve pipeline (set FLUSH_ACTIVE)
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          REPO: ${{ github.repository }}
          PIPELINE_LABEL: "critical-deploy-gitlab"
        run: |
          source scripts/includes/pipeline-guard.sh
          pipeline_guard_start

      - name: GitLab critical deploy
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_SYNC_TOKEN }}
          GL_PROJECT_ID: "81413316"
          GL_PROJECT_PATH: "openos-project/ops/fork-sync-all"
          GL_BRANCH: "main"
          PUSH_TO_GITLAB: ${{ inputs.push_to_gitlab }}
          CLEAR_PIPELINES: ${{ inputs.clear_pipelines }}
          PAUSE_SCHEDULES: ${{ inputs.pause_schedules }}
          RESUME_SCHEDULES: ${{ inputs.resume_schedules }}
          TRIGGER_PIPELINE: ${{ inputs.trigger_pipeline }}
          TRIGGER_CADENCE: ${{ inputs.trigger_cadence }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          source scripts/includes/quota-instrument.sh
          qi_begin
          bash scripts/critical-deploy-gitlab.sh

      - name: Release pipeline (clear FLUSH_ACTIVE)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          REPO: ${{ github.repository }}
          PIPELINE_LABEL: "critical-deploy-gitlab"
        run: |
          source scripts/includes/pipeline-guard.sh
          pipeline_guard_end

      - name: Write summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: |
          source scripts/includes/quota-instrument.sh
          qi_end
          bash scripts/write-summary.sh
