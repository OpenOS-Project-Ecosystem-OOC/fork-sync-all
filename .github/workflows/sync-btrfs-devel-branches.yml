name: Sync Upstream Branches

# Skeleton workflow: syncs branches from an upstream repo into a target repo
# via the GitHub API (no git clone required). Useful when GitHub only allows
# one fork per root repository (e.g. large kernel repos sharing an object store).
#
# Plug-and-play: set SOURCE_REPO and TARGET_REPO below, or override via
# workflow_dispatch inputs. No other changes needed.
#
# Rate limits:
#   2 API calls per branch (GET source SHA + GET/POST/PATCH target ref).
#   For repos with ~36 branches this is well within the 5000/hr budget.

on:
  schedule:
    # TODO: adjust frequency for your upstream's commit cadence
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      branches:
        description: "Space-separated branch names to sync (blank = all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run — print actions without making API calls"
        type: boolean
        required: false
        default: false
      source_repo:
        description: "Source repo (owner/repo)"
        required: false
        default: ""
      target_repo:
        description: "Target repo (owner/repo)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync branches
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          BRANCHES:    ${{ inputs.branches   || '' }}
          DRY_RUN:     ${{ inputs.dry_run    || 'false' }}
          # TODO: set defaults for your project, or leave blank to require
          # explicit input on each manual run
          SOURCE_REPO: ${{ inputs.source_repo || '' }}
          TARGET_REPO: ${{ inputs.target_repo || '' }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "SYNC_TOKEN not configured — skipping."
            exit 0
          fi
          if [[ -z "$SOURCE_REPO" || -z "$TARGET_REPO" ]]; then
            echo "SOURCE_REPO and TARGET_REPO must be set — skipping."
            exit 0
          fi
          bash scripts/sync-btrfs-devel-branches.sh

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
